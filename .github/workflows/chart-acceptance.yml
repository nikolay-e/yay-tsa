name: Chart Acceptance (kind)

# Fresh-cluster proof for the yay-tsa-stack umbrella: kind create -> helm install ->
# admin login -> empty library -> uninstall/reinstall survives. Runs on chart changes
# and on demand (not on every push — it boots a real JVM backend + Postgres, ~10 min).
on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/chart-acceptance.yml'
  workflow_dispatch:
    inputs:
      backend_tag:
        description: 'Backend image tag (ghcr fixture; e.g. main-<sha7>)'
        required: false
        default: 'latest'
      frontend_tag:
        description: 'Frontend image tag (ghcr fixture; e.g. main-<sha7>)'
        required: false
        default: 'latest'

concurrency:
  group: chart-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'latest'

      - name: Install kind + kubectl
        run: |
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          curl --proto '=https' --tlsv1.2 -fsSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl --proto '=https' --tlsv1.2 -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kind version && kubectl version --client

      # KNOWN LIMITATION: images cannot be pinned to the commit under test. Since the
      # 2026-07-11 migration, images build in-cluster and publish only to the WARP-only
      # Forgejo registry, unreachable from public runners. The ghcr images used here are
      # FROZEN pre-migration fixtures (:latest is immutable, not a moving target); this
      # job proves CHART mechanics, not image freshness. Tags are overridable via
      # workflow_dispatch inputs (or BACKEND_TAG/FRONTEND_TAG env for local runs).
      - name: Run acceptance test (frozen ghcr fixture images)
        env:
          BACKEND_TAG: ${{ inputs.backend_tag || 'latest' }}
          FRONTEND_TAG: ${{ inputs.frontend_tag || 'latest' }}
        run: bash charts/yay-tsa-stack/ci/kind-acceptance-test.sh

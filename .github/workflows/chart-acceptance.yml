name: Chart Acceptance (kind)

# Fresh-cluster proof for the yay-tsa-stack umbrella: kind create -> helm install ->
# admin login -> empty library -> uninstall/reinstall survives. Runs on chart changes
# and on demand (not on every push — it boots a real JVM backend + Postgres, ~10 min).
on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/workflows/chart-acceptance.yml'
  workflow_dispatch:

concurrency:
  group: chart-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'latest'

      - name: Install kind + kubectl
        run: |
          curl -fsSLo /tmp/kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kind version && kubectl version --client

      - name: Run acceptance test (registry :latest images)
        run: bash charts/yay-tsa-stack/ci/kind-acceptance-test.sh

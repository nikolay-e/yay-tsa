name: Release Helm Chart

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      # Run legs one at a time: they all push to gh-pages, and the job-level
      # concurrency group allows only one running + one pending, so a third
      # parallel leg would be cancelled.
      max-parallel: 1
      matrix:
        chart:
          - yay-tsa
          - yay-tsa-v2
          - yay-tsa-stack
    runs-on: ubuntu-latest
    # Serialize matrix legs on the shared gh-pages branch.
    concurrency:
      group: release-chart-gh-pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Git
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: 'latest'

      - name: Determine chart version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            CHART_VERSION="${GITHUB_REF_NAME#v}"
            APP_VERSION="${GITHUB_REF_NAME}"
            RELEASE_TYPE="stable"
          else
            BASE_VERSION=$(grep '^version:' charts/${{ matrix.chart }}/Chart.yaml | awk '{print $2}')
            # Semver pre-release identifiers sort lexicographically; random SHAs sort
            # non-chronologically (e.g. "g0c3b64d" < "ge2733e1"). Prefix with the github
            # run number (left-padded so 1 < 10 < 100) so every newer build always sorts
            # higher. SHA stays for debuggability.
            RUN_PAD=$(printf '%010d' "${GITHUB_RUN_NUMBER:-0}")
            CHART_VERSION="${BASE_VERSION}-main.r${RUN_PAD}-g${SHORT_SHA}"
            APP_VERSION="main-${SHORT_SHA}"
            RELEASE_TYPE="dev"
          fi

          {
            echo "chart_version=${CHART_VERSION}"
            echo "app_version=${APP_VERSION}"
            echo "release_type=${RELEASE_TYPE}"
          } >> "$GITHUB_OUTPUT"

      - name: Package chart
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.chart_version }}/" charts/${{ matrix.chart }}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: '${{ steps.version.outputs.app_version }}'/" charts/${{ matrix.chart }}/Chart.yaml
          # The umbrella pins frontend+backend to a concrete, reproducible tag in the
          # PUBLISHED artifact (both images build from the same monorepo SHA). The committed
          # values keep `latest` only for local-clone convenience.
          if [ "${{ matrix.chart }}" = "yay-tsa-stack" ]; then
            sed -i "s/tag: latest/tag: ${{ steps.version.outputs.app_version }}/" charts/yay-tsa-stack/values.yaml
            # helm dependency build is NOT recursive: the subcharts must vendor their own
            # yay-tsa-common library before the umbrella packages them, or the published
            # umbrella tgz omits it and rendering fails on yay-tsa-common.* helpers.
            helm dependency build charts/yay-tsa-v2
            helm dependency build charts/yay-tsa
          fi
          helm dependency build charts/${{ matrix.chart }}
          helm package charts/${{ matrix.chart }} -d .packaged

      - name: Create GitHub Release (stable only)
        if: steps.version.outputs.release_type == 'stable'
        run: |
          gh release create "${{ matrix.chart }}-${{ steps.version.outputs.chart_version }}" \
            .packaged/${{ matrix.chart }}-${{ steps.version.outputs.chart_version }}.tgz \
            --title "${{ matrix.chart }}-${{ steps.version.outputs.chart_version }}" \
            --notes "Helm chart release ${{ matrix.chart }} ${{ steps.version.outputs.chart_version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout gh-pages
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update repository index
        run: |
          cp .packaged/*.tgz gh-pages/
          cd gh-pages

          # Clean old dev tarballs per chart (keep last 10)
          find . -maxdepth 1 -name '${{ matrix.chart }}-*-main.*.tgz' -printf '%T@ %p\n' | sort -rn | tail -n +11 | cut -d' ' -f2- | xargs -r rm

          # Regenerate index from all tarballs in directory
          helm repo index . --url https://nikolay-e.github.io/yay-tsa

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git add .
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Release ${{ matrix.chart }}-${{ steps.version.outputs.chart_version }}"
          # Defensive retry in case another matrix leg pushed first.
          for i in 1 2 3; do
            git pull --rebase origin gh-pages || true
            if git push origin gh-pages; then
              exit 0
            fi
            echo "Push attempt $i failed; retrying after 5s"
            sleep 5
          done
          exit 1

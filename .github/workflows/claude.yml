name: Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    uses: nikolay-e/treemapper-claude-code-review-action/.github/workflows/claude-code-review.yml@fbc0f228bd2c36ea733c866d025df4721e876ab6 # main
    with:
      model: claude-opus-4-6
      max_turns: 15
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      treemapper_issues_token: ${{ secrets.TREEMAPPER_ISSUES_TOKEN }}

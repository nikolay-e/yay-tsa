name: Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    uses: nikolay-e/treemapper-claude-code-review-action/.github/workflows/claude-code-review.yml@main
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

name: Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    uses: nikolay-e/treemapper-claude-code-review-action/.github/workflows/claude-code-review.yml@cc6a55ff9938e8c13179ea7bb1e07dfce1038c91 # main
    with:
      model: claude-opus-4-6
      max_turns: 15
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      treemapper_issues_token: ${{ secrets.TREEMAPPER_ISSUES_TOKEN }}

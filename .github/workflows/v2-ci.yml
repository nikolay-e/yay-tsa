name: CI (v2)

on:
  push:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'

# Cancel superseded PR runs, but queue pushes to main: cancelling a main run
# mid post-deploy verification would leave the deployed commit unverified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gradle-test:
    name: v2 Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('yay-tsa-v2/**/*.gradle*', 'yay-tsa-v2/**/gradle-wrapper.properties', 'yay-tsa-v2/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-v2-${{ runner.os }}-

      - name: Run Gradle build + tests
        working-directory: yay-tsa-v2
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v2-test-reports
          path: |
            yay-tsa-v2/**/build/reports/tests/
            yay-tsa-v2/**/build/test-results/
          retention-days: 7

  post-deploy-verify:
    name: v2 Post-Deploy Verify
    # The backend image builds and deploys from the internal CI (Argo Workflows
    # -> Forgejo registry -> ArgoCD Image Updater) on EVERY push to main,
    # independent of this workflow — this job only verifies the live rollout.
    # The GitHub mirror lags Forgejo by up to ~5min, so the internal
    # build+deploy is usually done by now; wait-backend-rollout polls out the rest.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      BASE_URL: https://yay-tsa.com

    steps:
      # The local wait-backend-rollout composite action below needs the repo on disk.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # /api/System/Info/Public echoes BuildSha (=main-<sha7> from the GIT_SHA the
      # deployment injects), so the rolled-out image is fingerprintable from
      # outside. Poll for the exact SHA plus three consecutive healthy reads
      # instead of blindly sleeping out the Image Updater + rollout window.
      - name: Wait for backend rollout
        uses: ./.github/actions/wait-backend-rollout
        with:
          base-url: ${{ env.BASE_URL }}

      - name: Auth round-trip
        env:
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: |
          BODY=$(jq -n --arg u "$QA_USERNAME" --arg p "$QA_PASSWORD" '{Username: $u, Pw: $p}')
          TOKEN=$(curl -fsS --max-time 15 -X POST "${BASE_URL}/api/Users/AuthenticateByName" \
            -H 'Content-Type: application/json' \
            --data "$BODY" | jq -re '.AccessToken')
          echo "::add-mask::$TOKEN"
          echo "QA_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Authenticated as ${QA_USERNAME}"

      - name: Streaming smoke (Range request)
        run: |
          ITEM_ID=$(curl -fsS --max-time 15 \
            -H "Authorization: Bearer ${QA_TOKEN}" \
            "${BASE_URL}/api/Items?IncludeItemTypes=Audio&Recursive=true&Limit=1" \
            | jq -r '.Items[0].Id // empty')
          if [ -z "$ITEM_ID" ]; then
            echo "::warning::Library returned no audio items; skipping streaming smoke"
            exit 0
          fi
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 \
            -H "Authorization: Bearer ${QA_TOKEN}" \
            -H 'Range: bytes=0-1023' \
            "${BASE_URL}/api/Audio/${ITEM_ID}/stream")
          echo "GET /api/Audio/${ITEM_ID}/stream with Range bytes=0-1023 -> ${STATUS}"
          if [ "$STATUS" = "206" ]; then
            echo "Streaming smoke passed"
          elif [ "$STATUS" -ge 500 ]; then
            echo "::error::Streaming endpoint returned ${STATUS} (server error)"
            exit 1
          else
            echo "::error::Expected 206 Partial Content, got ${STATUS}"
            exit 1
          fi

      # SSE command round-trip: proves the whole delivery loop — heartbeat identity echo,
      # lease resolution, RemoteCommandPort -> outbox -> poller -> SSE bridge -> fan-out.
      # Catches both "command never published" bugs and a starved outbox poller, which
      # keep every HTTP check green while remote control is silently dead (2026-07-10).
      - name: SSE command round-trip
        run: |
          DEVICE_ID=$(curl -fsS --max-time 15 -X POST \
            -H "Authorization: Bearer ${QA_TOKEN}" -H 'Content-Type: application/json' \
            -d '{}' "${BASE_URL}/api/v1/me/devices/heartbeat" | jq -re '.deviceId')
          echo "Registered device: ${DEVICE_ID}"
          ITEM_ID=$(curl -fsS --max-time 15 \
            -H "Authorization: Bearer ${QA_TOKEN}" \
            "${BASE_URL}/api/Items?IncludeItemTypes=Audio&Recursive=true&Limit=1" \
            | jq -r '.Items[0].Id // empty')
          if [ -z "$ITEM_ID" ]; then
            echo "::warning::Library returned no audio items; skipping SSE round-trip"
            exit 0
          fi
          curl -fsS --max-time 15 -X POST \
            -H "Authorization: Bearer ${QA_TOKEN}" -H 'Content-Type: application/json' \
            -d "{\"ItemId\":\"${ITEM_ID}\",\"PositionTicks\":0}" \
            "${BASE_URL}/api/Sessions/Playing" > /dev/null
          SSE_FILE=$(mktemp)
          curl -sN --max-time 25 \
            "${BASE_URL}/api/v1/me/devices/events?api_key=${QA_TOKEN}" > "$SSE_FILE" &
          SSE_PID=$!
          sleep 2
          curl -fsS --max-time 15 -X POST \
            -H "Authorization: Bearer ${QA_TOKEN}" -H 'Content-Type: application/json' \
            -d '{"command":"pause"}' \
            "${BASE_URL}/api/v1/me/devices/${DEVICE_ID}/command" > /dev/null
          DEADLINE=$((SECONDS + 20))
          while [ $SECONDS -lt $DEADLINE ]; do
            if grep -q '"type":"PAUSE"' "$SSE_FILE" && grep -q "\"targetDeviceId\":\"${DEVICE_ID}\"" "$SSE_FILE"; then
              echo "SSE round-trip passed: PAUSE delivered to ${DEVICE_ID}"
              kill $SSE_PID 2>/dev/null || true
              curl -fsS --max-time 15 -X POST \
                -H "Authorization: Bearer ${QA_TOKEN}" -H 'Content-Type: application/json' \
                -d "{\"ItemId\":\"${ITEM_ID}\",\"PositionTicks\":0}" \
                "${BASE_URL}/api/Sessions/Playing/Stopped" > /dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill $SSE_PID 2>/dev/null || true
          echo "::error::PAUSE command was not delivered over SSE within 20s (published-but-undelivered or outbox stalled)"
          echo "--- SSE stream received ---"; cat "$SSE_FILE"
          exit 1

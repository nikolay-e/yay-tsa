name: CI (v2)

on:
  push:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle-test:
    name: v2 Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('yay-tsa-v2/**/*.gradle*', 'yay-tsa-v2/**/gradle-wrapper.properties', 'yay-tsa-v2/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-v2-${{ runner.os }}-

      - name: Run Gradle build + tests
        working-directory: yay-tsa-v2
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v2-test-reports
          path: |
            yay-tsa-v2/**/build/reports/tests/
            yay-tsa-v2/**/build/test-results/
          retention-days: 7

  docker-build-v2:
    name: v2 Build Docker
    needs: gradle-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: yay-tsa-v2/backend
          context: ./yay-tsa-v2
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

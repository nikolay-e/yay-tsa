name: CI (v2)

on:
  push:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'

# Cancel superseded PR runs, but queue pushes to main: cancelling a main run
# after the image push but before post-deploy verification would deploy
# unverified code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gradle-test:
    name: v2 Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('yay-tsa-v2/**/*.gradle*', 'yay-tsa-v2/**/gradle-wrapper.properties', 'yay-tsa-v2/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-v2-${{ runner.os }}-

      - name: Run Gradle build + tests
        working-directory: yay-tsa-v2
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v2-test-reports
          path: |
            yay-tsa-v2/**/build/reports/tests/
            yay-tsa-v2/**/build/test-results/
          retention-days: 7

  docker-build-v2:
    name: v2 Build Docker
    needs: gradle-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: yay-tsa-v2/backend
          context: .
          dockerfile: yay-tsa-v2/Dockerfile
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  post-deploy-verify:
    name: v2 Post-Deploy Verify
    needs: [docker-build-v2]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      BASE_URL: https://yay-tsa.com

    steps:
      # /api/System/Info/Public echoes BuildSha (=main-<sha7> from the GIT_SHA the
      # deployment injects), so the rolled-out image is fingerprintable from
      # outside. Poll for the exact SHA plus three consecutive healthy reads
      # instead of blindly sleeping out the Image Updater + rollout window.
      - name: Wait for backend rollout
        run: |
          EXPECTED="main-${GITHUB_SHA:0:7}"
          DEADLINE=$((SECONDS + 1500))
          HEALTHY=0
          echo "Polling ${BASE_URL}/api/System/Info/Public until BuildSha=${EXPECTED}"
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            SHA=$(curl -fsS --max-time 10 "${BASE_URL}/api/System/Info/Public" | jq -r '.BuildSha // empty' || true)
            if [ "$SHA" = "$EXPECTED" ]; then
              HEALTHY=$((HEALTHY + 1))
              echo "Backend serves ${EXPECTED} (${HEALTHY}/3 consecutive probes)"
              if [ "$HEALTHY" -ge 3 ]; then
                exit 0
              fi
            else
              HEALTHY=0
              echo "Backend BuildSha='${SHA:-<none>}' != ${EXPECTED}; retrying"
            fi
            sleep 15
          done
          echo "::error::Backend never settled on ${EXPECTED} within 25 minutes after the image push. This is a deploy failure (Image Updater lag, crash loop, or sync failure), not a QA failure."
          exit 1

      - name: Auth round-trip
        env:
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
        run: |
          BODY=$(jq -n --arg u "$QA_USERNAME" --arg p "$QA_PASSWORD" '{Username: $u, Pw: $p}')
          TOKEN=$(curl -fsS --max-time 15 -X POST "${BASE_URL}/api/Users/AuthenticateByName" \
            -H 'Content-Type: application/json' \
            --data "$BODY" | jq -re '.AccessToken')
          echo "::add-mask::$TOKEN"
          echo "QA_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "Authenticated as ${QA_USERNAME}"

      - name: Streaming smoke (Range request)
        run: |
          ITEM_ID=$(curl -fsS --max-time 15 \
            -H "Authorization: Bearer ${QA_TOKEN}" \
            "${BASE_URL}/api/Items?IncludeItemTypes=Audio&Recursive=true&Limit=1" \
            | jq -r '.Items[0].Id // empty')
          if [ -z "$ITEM_ID" ]; then
            echo "::warning::Library returned no audio items; skipping streaming smoke"
            exit 0
          fi
          STATUS=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 \
            -H "Authorization: Bearer ${QA_TOKEN}" \
            -H 'Range: bytes=0-1023' \
            "${BASE_URL}/api/Audio/${ITEM_ID}/stream")
          echo "GET /api/Audio/${ITEM_ID}/stream with Range bytes=0-1023 -> ${STATUS}"
          if [ "$STATUS" = "206" ]; then
            echo "Streaming smoke passed"
          elif [ "$STATUS" -ge 500 ]; then
            echo "::error::Streaming endpoint returned ${STATUS} (server error)"
            exit 1
          else
            echo "::error::Expected 206 Partial Content, got ${STATUS}"
            exit 1
          fi

name: CI (v2)

on:
  push:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'yay-tsa-v2/**'
      - 'charts/yay-tsa-v2/**'
      - '.github/workflows/v2-ci.yml'

# Cancel superseded PR runs, but queue pushes to main: cancelling a main run
# mid post-deploy verification would leave the deployed commit unverified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gradle-test:
    name: v2 Gradle test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ runner.os }}-${{ hashFiles('yay-tsa-v2/**/*.gradle*', 'yay-tsa-v2/**/gradle-wrapper.properties', 'yay-tsa-v2/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-v2-${{ runner.os }}-

      - name: Run Gradle build + tests
        working-directory: yay-tsa-v2
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: v2-test-reports
          path: |
            yay-tsa-v2/**/build/reports/tests/
            yay-tsa-v2/**/build/test-results/
          retention-days: 7

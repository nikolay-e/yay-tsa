name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install dependencies
        run: npm ci

      - name: Cache pre-commit hooks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Check bundle size budget
        run: npx bundlewatch --config .bundlewatchrc.json

  build-android-apk:
    name: Build Android APK
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        working-directory: apps/android-twa
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: apps/android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          if-no-files-found: error

  docker-build-frontend:
    name: Build Frontend Image
    needs: [build-android-apk]
    if: ${{ !cancelled() && needs.build-android-apk.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Android APK
        if: needs.build-android-apk.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-apk
          path: apps/web/public/downloads

      - name: Rename APK
        if: needs.build-android-apk.result == 'success'
        run: mv apps/web/public/downloads/app-release.apk apps/web/public/downloads/yay-tsa.apk

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: frontend
          context: .
          dockerfile: apps/web/Dockerfile
          target: production
          build-args: APP_ENVIRONMENT=production
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-audio-separator:
    name: Build Audio Separator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: audio-separator
          context: ./services/audio-separator
          build-args: VARIANT=gpu
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu
            type=gha,scope=audio-separator
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-feature-extractor:
    name: Build Feature Extractor Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: feature-extractor
          context: ./services/audio-separator
          build-args: VARIANT=essentia
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia
            type=gha,scope=feature-extractor
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  post-deploy-qa:
    name: Post-Deploy QA
    needs: [docker-build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Schemathesis with --checks all takes ~22min against the live backend
    # (Coverage ~6min + Fuzzing ~16min before the Stateful phase even starts).
    # ZAP and crawler add more, so 30min was too tight and silently truncated the run.
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Schemathesis
        run: pip install schemathesis

      - name: Install crawler dependencies
        working-directory: tools/frontend-crawler
        run: npm ci && npx playwright install chromium

      # Post-cutover (2026-05-16): live backend is v2 in yay-tsa-v2-production
      # and its image rolls out from yay-tsa-v2/.github/workflows/v2-ci.yml,
      # not this workflow. We skip the rollout-wait probe and run Schemathesis
      # against whatever version is currently live.

      - name: Run Schemathesis
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          PROD_URL: https://yay-tsa.com
        run: |
          TOKEN=$(curl -sf -X POST "$PROD_URL/api/Users/AuthenticateByName" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$QA_USERNAME\",\"Pw\":\"$QA_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessToken'])")
          curl -sf "$PROD_URL/api/v3/api-docs" > /tmp/openapi.json
          python3 -c "
          import json
          with open('/tmp/openapi.json') as f: spec = json.load(f)
          spec['servers'] = [{'url': '$PROD_URL/api'}]
          with open('/tmp/openapi.json', 'w') as f: json.dump(spec, f)
          "
          st run /tmp/openapi.json \
            --url "$PROD_URL/api" \
            -H "Authorization: Bearer $TOKEN" \
            --checks all \
            --exclude-checks ignored_auth,unsupported_method \
            --exclude-path '/Items/{itemId}/Images/{imageType}' \
            --exclude-path-regex '/Admin/' \
            --exclude-path-regex '/v1/me/devices/(events|commands)' \
            --exclude-path-regex '/v1/groups/{id}/events' \
            --exclude-path-regex '/v1/sessions/{sessionId}/queue/events' \
            2>&1 | tee /tmp/schemathesis.txt

      - name: Run ZAP
        continue-on-error: true
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          PROD_URL: https://yay-tsa.com
        run: |
          TOKEN=$(curl -sf -X POST "$PROD_URL/api/Users/AuthenticateByName" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$QA_USERNAME\",\"Pw\":\"$QA_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessToken'])")
          docker run --rm -v /tmp:/zap/wrk ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -t /zap/wrk/openapi.json \
            -f openapi \
            -z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement='Bearer $TOKEN'" \
            -J /zap/wrk/zap-report.json \
            -I \
            2>&1 | tee /tmp/zap.txt

      - name: Gate on ZAP HIGH findings
        run: |
          if [ ! -f /tmp/zap-report.json ]; then
            echo "::error::ZAP report not generated"
            exit 1
          fi
          HIGH=$(jq '[.site[]?.alerts[]? | select(.riskcode=="3")] | length' /tmp/zap-report.json)
          echo "ZAP HIGH findings: $HIGH"
          if [ "$HIGH" -gt 0 ]; then
            echo "::error::ZAP detected $HIGH HIGH-severity findings"
            jq '.site[]?.alerts[]? | select(.riskcode=="3") | {name, riskdesc, url: (.instances[0]?.uri // "n/a")}' /tmp/zap-report.json
            exit 1
          fi

      - name: Cooldown after API scans
        run: sleep 30

      - name: Run frontend crawler
        env:
          CRAWL_URL: https://yay-tsa.com
          CRAWL_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          CRAWL_PASSWORD: ${{ secrets.QA_PASSWORD }}
          CRAWL_MAX_PAGES: '30'
        working-directory: tools/frontend-crawler
        run: node crawl.js 2>&1 | tee /tmp/crawler.txt

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: post-deploy-qa-reports
          path: /tmp/*.txt
          retention-days: 7

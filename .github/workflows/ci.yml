name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install dependencies
        run: npm ci

      - name: Cache pre-commit hooks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun

  build-android-apk:
    name: Build Android APK
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        working-directory: apps/android-twa
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: apps/android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          if-no-files-found: error

  docker-build-frontend:
    name: Build Frontend Image
    needs: [build-android-apk]
    if: ${{ !cancelled() && needs.build-android-apk.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Android APK
        if: needs.build-android-apk.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-apk
          path: apps/web/public/downloads

      - name: Rename APK
        if: needs.build-android-apk.result == 'success'
        run: mv apps/web/public/downloads/app-release.apk apps/web/public/downloads/yay-tsa.apk

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: frontend
          context: .
          dockerfile: apps/web/Dockerfile
          target: production
          build-args: APP_ENVIRONMENT=production
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: backend
          context: ./services/server
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-audio-separator:
    name: Build Audio Separator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: audio-separator
          context: ./services/audio-separator
          build-args: VARIANT=gpu
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu
            type=gha,scope=audio-separator
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-feature-extractor:
    name: Build Feature Extractor Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: feature-extractor
          context: ./services/audio-separator
          build-args: VARIANT=essentia
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia
            type=gha,scope=feature-extractor
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend integration tests (Testcontainers)
        working-directory: services/server
        run: mvn test -B -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-test-results
          path: |
            services/server/target/surefire-reports/
          retention-days: 7

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate test media files
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg > /dev/null
          bash scripts/generate-test-media.sh services/server/media

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and run tests
        run: |
          docker compose --profile e2e-test up --build -d
          docker compose --profile e2e-test logs -f e2e-test &
          LOGS_PID=$!
          E2E_EXIT=$(docker wait yay-tsa-e2e-test)
          kill $LOGS_PID 2>/dev/null || true
          echo ""
          echo "E2E tests exit code: $E2E_EXIT"
          echo "::group::E2E test runner logs"
          docker logs yay-tsa-e2e-test 2>&1
          echo "::endgroup::"
          if [ "$E2E_EXIT" -ne 0 ]; then
            echo "::group::Backend application logs"
            docker logs yay-tsa-backend 2>&1
            echo "::endgroup::"
            echo "::group::Frontend logs"
            docker logs yay-tsa-frontend 2>&1
            echo "::endgroup::"
            exit 1
          fi
        env:
          YAYTSA_TEST_USERNAME: admin
          YAYTSA_TEST_PASSWORD: admin123

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-test-results
          path: |
            test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose --profile e2e-test down -v

  post-deploy-qa:
    name: Post-Deploy QA
    needs: [docker-build-frontend, docker-build-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Schemathesis
        run: pip install schemathesis

      - name: Install crawler dependencies
        working-directory: tools/frontend-crawler
        run: npm ci && npx playwright install chromium

      - name: Generate image tags
        id: tags
        run: echo "expected_tag=main-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Wait for rollout
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          PROD_URL: https://yay-tsa.com
        run: |
          EXPECTED="${{ steps.tags.outputs.expected_tag }}"
          echo "Waiting for backend version: $EXPECTED"
          AUTH_FAILS=0
          for i in $(seq 1 40); do
            AUTH_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$PROD_URL/api/Users/AuthenticateByName" \
              -H "Content-Type: application/json" \
              -d "{\"Username\":\"$QA_USERNAME\",\"Pw\":\"$QA_PASSWORD\"}")
            AUTH_STATUS=$(echo "$AUTH_RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
            AUTH_BODY=$(echo "$AUTH_RESPONSE" | sed '$d')
            TOKEN=$(echo "$AUTH_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('AccessToken',''))" 2>/dev/null || echo "")
            if [ -z "$TOKEN" ]; then
              AUTH_FAILS=$((AUTH_FAILS + 1))
              echo "Attempt $i/40: auth failed (HTTP $AUTH_STATUS) — fail count $AUTH_FAILS"
              # Persistent auth failure (>3 attempts) is a credential/user problem, not a rollout problem.
              if [ "$AUTH_FAILS" -ge 4 ]; then
                echo "::error::Auth failed 4+ times for QA_USERNAME='$QA_USERNAME' (HTTP $AUTH_STATUS). Check the QA test user exists and QA_PASSWORD secret is current."
                exit 1
              fi
              sleep 15
              continue
            fi
            AUTH_FAILS=0
            VERSION=$(curl -sf -H "Authorization: Bearer $TOKEN" "$PROD_URL/api/System/Info/Public" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('Version',''))" 2>/dev/null || echo "")
            if [ "$VERSION" = "$EXPECTED" ]; then
              echo "Backend deployed: $VERSION"
              break
            fi
            echo "Attempt $i/40: got '$VERSION', expected '$EXPECTED'"
            sleep 15
          done
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::Backend version mismatch after 10min: got '$VERSION', expected '$EXPECTED'"
            exit 1
          fi

      - name: Run Schemathesis
        continue-on-error: true
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          PROD_URL: https://yay-tsa.com
        run: |
          TOKEN=$(curl -sf -X POST "$PROD_URL/api/Users/AuthenticateByName" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$QA_USERNAME\",\"Pw\":\"$QA_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessToken'])")
          curl -sf "$PROD_URL/api/api-docs" > /tmp/openapi.json
          python3 -c "
          import json
          with open('/tmp/openapi.json') as f: spec = json.load(f)
          spec['servers'] = [{'url': '$PROD_URL/api'}]
          with open('/tmp/openapi.json', 'w') as f: json.dump(spec, f)
          "
          st run /tmp/openapi.json \
            --url "$PROD_URL/api" \
            -H "Authorization: Bearer $TOKEN" \
            --checks all \
            --exclude-checks ignored_auth,unsupported_method \
            --exclude-path '/Items/{itemId}/Images/{imageType}' \
            --exclude-path-regex '/Admin/' \
            --exclude-path-regex '/v1/me/devices/(events|commands)' \
            --exclude-path-regex '/v1/groups/{id}/events' \
            --exclude-path-regex '/v1/sessions/{sessionId}/queue/events' \
            2>&1 | tee /tmp/schemathesis.txt

      - name: Run ZAP
        continue-on-error: true
        env:
          QA_PASSWORD: ${{ secrets.QA_PASSWORD }}
          QA_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          PROD_URL: https://yay-tsa.com
        run: |
          TOKEN=$(curl -sf -X POST "$PROD_URL/api/Users/AuthenticateByName" \
            -H "Content-Type: application/json" \
            -d "{\"Username\":\"$QA_USERNAME\",\"Pw\":\"$QA_PASSWORD\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['AccessToken'])")
          docker run --rm -v /tmp:/zap/wrk ghcr.io/zaproxy/zaproxy:stable zap-api-scan.py \
            -t /zap/wrk/openapi.json \
            -f openapi \
            -z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement='Bearer $TOKEN'" \
            -J /zap/wrk/zap-report.json \
            -I \
            2>&1 | tee /tmp/zap.txt

      - name: Cooldown after API scans
        run: sleep 30

      - name: Run frontend crawler
        continue-on-error: true
        env:
          CRAWL_URL: https://yay-tsa.com
          CRAWL_USERNAME: ${{ vars.QA_USERNAME || 'test' }}
          CRAWL_PASSWORD: ${{ secrets.QA_PASSWORD }}
          CRAWL_MAX_PAGES: '30'
        working-directory: tools/frontend-crawler
        run: node crawl.js 2>&1 | tee /tmp/crawler.txt

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: post-deploy-qa-reports
          path: /tmp/*.txt
          retention-days: 7

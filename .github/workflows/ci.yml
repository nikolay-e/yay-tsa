name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install dependencies
        run: npm ci

      - name: Cache pre-commit hooks
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun

  build-android-apk:
    name: Build Android APK
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        working-directory: apps/android-twa
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk
          path: apps/android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          if-no-files-found: error

  docker-build-frontend:
    name: Build Frontend Image
    needs: [build-android-apk]
    if: ${{ !cancelled() && needs.build-android-apk.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Android APK
        if: needs.build-android-apk.result == 'success'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-apk
          path: apps/web/public/downloads

      - name: Rename APK
        if: needs.build-android-apk.result == 'success'
        run: mv apps/web/public/downloads/app-release.apk apps/web/public/downloads/yay-tsa.apk

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA:0:7}"
          PRIMARY_TAG="main-${SHORT_SHA}"
          TAGS="${{ env.REGISTRY }}/${{ github.repository }}/frontend:${PRIMARY_TAG}"
          APP_ENVIRONMENT="staging"

          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/frontend:${GIT_REF_NAME}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest"
            APP_ENVIRONMENT="production"
          fi

          {
            echo "tags=${TAGS}"
            echo "primary_tag=${PRIMARY_TAG}"
            echo "app_environment=${APP_ENVIRONMENT}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.primary_tag }}
            APP_ENVIRONMENT=${{ steps.tags.outputs.app_environment }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Frontend image pushed with tags: ${{ steps.tags.outputs.tags }}"
          echo "Primary tag: ${{ steps.tags.outputs.primary_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  docker-build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA:0:7}"
          PRIMARY_TAG="main-${SHORT_SHA}"
          TAGS="${{ env.REGISTRY }}/${{ github.repository }}/backend:${PRIMARY_TAG}"

          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/backend:${GIT_REF_NAME}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/backend:latest"
          fi

          {
            echo "tags=${TAGS}"
            echo "primary_tag=${PRIMARY_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/backend

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./services/server
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.tags.outputs.primary_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Backend image pushed with tags: ${{ steps.tags.outputs.tags }}"
          echo "Primary tag: ${{ steps.tags.outputs.primary_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  docker-build-audio-separator:
    name: Build Audio Separator Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA:0:7}"
          PRIMARY_TAG="main-${SHORT_SHA}"
          TAGS="${{ env.REGISTRY }}/${{ github.repository }}/audio-separator:${PRIMARY_TAG}"

          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/audio-separator:${GIT_REF_NAME}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/audio-separator:latest"
          fi

          {
            echo "tags=${TAGS}"
            echo "primary_tag=${PRIMARY_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/audio-separator

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./services/audio-separator
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=gpu
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/audio-separator:buildcache-gpu
            type=gha,scope=audio-separator
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/audio-separator:buildcache-gpu,mode=max,image-manifest=true
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Audio Separator image pushed with tags: ${{ steps.tags.outputs.tags }}"
          echo "Primary tag: ${{ steps.tags.outputs.primary_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  docker-build-feature-extractor:
    name: Build Feature Extractor Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          GIT_REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${GIT_SHA:0:7}"
          PRIMARY_TAG="main-${SHORT_SHA}"
          TAGS="${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor:${PRIMARY_TAG}"

          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor:${GIT_REF_NAME}"
            TAGS="${TAGS},${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor:latest"
          fi

          {
            echo "tags=${TAGS}"
            echo "primary_tag=${PRIMARY_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./services/audio-separator
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=essentia
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor:buildcache-essentia
            type=gha,scope=feature-extractor
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/feature-extractor:buildcache-essentia,mode=max,image-manifest=true
          platforms: linux/amd64,linux/arm64

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Feature Extractor image pushed with tags: ${{ steps.tags.outputs.tags }}"
          echo "Primary tag: ${{ steps.tags.outputs.primary_tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Cancel superseded PR runs, but queue pushes to main: cancelling a main run
# mid post-deploy QA would leave the deployed commit unverified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install dependencies
        run: npm ci

      - name: Cache pre-commit hooks
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          # Fall back to any prior cache when the config hash changes so hook
          # environments are reused across runs (all hook repos are public or
          # vendored locally, so a cold cache miss rebuilds cleanly).
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Check bundle size budget
        run: npx bundlewatch --config .bundlewatchrc.json

      - name: Enforce total bundle budget
        run: node scripts/bundle-report.mjs --max-total-gzip=210

  web-e2e-mocked:
    name: Web E2E (mocked, backend-free)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build core + platform (the dev server resolves them at runtime)
        run: npm run build:core && npm run build:platform

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run backend-free auth-persistence suite
        run: npx playwright test --project=chromium-mocked
        working-directory: apps/web

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-mocked
          path: apps/web/playwright-report
          retention-days: 3
          if-no-files-found: ignore

  build-android-apk:
    name: Build Android APK
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        working-directory: apps/android-twa
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: apps/android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          if-no-files-found: error

  audio-ml-test:
    name: Audio ML Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: services/audio-ml/requirements/test.txt

      - name: Install test dependencies
        working-directory: services/audio-ml
        run: pip install -r requirements/test.txt

      - name: Run pytest
        working-directory: services/audio-ml
        run: pytest tests/

  post-deploy-qa:
    name: Post-Deploy QA
    # Images build and deploy from the internal CI (Argo Workflows -> Forgejo
    # registry -> ArgoCD Image Updater) on EVERY push to main, independent of
    # this workflow — this job only verifies the live deployment. The GitHub
    # mirror lags Forgejo by up to ~5min, so by the time this runs the internal
    # build+deploy is usually done; the rollout-wait retry loops absorb the rest.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Schemathesis --checks all (Coverage + Fuzzing + Stateful) alone runs ~60min
    # against the live backend when chronic endpoints fail (Hypothesis shrinking),
    # which at timeout-minutes:60 left no budget for crawler/axe/ZAP — they never
    # ran and the job was SIGTERM'd mid-Stateful. 120 lets the full suite finish.
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      # The local wait-backend-rollout composite action below needs the repo on disk.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The internal CI builds the frontend for every push and bakes
      # VITE_APP_VERSION=main-<sha7> into the eager JS chunks, so the live
      # version is detectable by grepping the assets referenced from index.html.
      # QA must not start until the site serves THIS commit, otherwise it
      # validates the previous deploy.
      - name: Wait for frontend rollout
        env:
          BASE_URL: https://yay-tsa.com
        run: |
          EXPECTED="main-${GITHUB_SHA:0:7}"
          DEADLINE=$((SECONDS + 1500))
          echo "Polling ${BASE_URL} until it serves frontend version ${EXPECTED}"
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            ASSETS=$(curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}/index.html?rollout=$(date +%s)" \
              | grep -oE '/assets/[A-Za-z0-9._-]+\.js' | sort -u || true)
            for ASSET in $ASSETS; do
              if curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}${ASSET}" | grep -q "$EXPECTED"; then
                echo "Live frontend serves ${EXPECTED} (found in ${ASSET})"
                exit 0
              fi
            done
            echo "Live frontend is not on ${EXPECTED} yet; retrying in 20s"
            sleep 20
          done
          echo "::error::Rollout never happened: ${BASE_URL} still does not serve ${EXPECTED} after 25 minutes (Image Updater lag or ArgoCD sync failure). QA was not reached, so this is a deploy failure, not a QA failure."
          exit 1

      # Schemathesis fuzzes /api/* (the backend). The backend image rolls out
      # independently of the frontend, so QA that starts on the frontend signal
      # alone can hit the backend mid-rollout and report transient 502s
      # (Cloudflare HTML) as conformance failures. The internal CI builds the
      # backend on every push too (no path filtering), so the expected BuildSha
      # is simply main-<sha7> of THIS commit — /System/Info/Public echoes it;
      # wait for it AND three consecutive healthy reads so the backend is
      # settled before fuzzing.
      - name: Wait for backend rollout
        uses: ./.github/actions/wait-backend-rollout
        with:
          base-url: https://yay-tsa.com

      - name: Run AutoQA (Schemathesis + ZAP + crawler + axe)
        uses: nikolay-e/autoqa@0f560a5c1be47eb735960fc2753a95b5096ba8b1 # main (fix(schemathesis): send Origin header so CSRF gate doesn't mask auth checks)
        with:
          url: https://yay-tsa.com
          auth-url: /api/Users/AuthenticateByName
          auth-body: '{"Username":"${{ vars.QA_USERNAME || ''test'' }}","Pw":"${{ secrets.QA_PASSWORD }}"}'

          # This job only ever runs on push to main, where the stock baseline
          # gate absorbs NEW crawler findings into the baseline and merely
          # warns — it could never block. Alarm-once instead: a regression
          # fails this one run, the updated baseline keeps the next run green.
          baseline-fail-on-new: 'true'

          schemathesis-enabled: 'true'
          openapi-url: /api/v3/api-docs
          # Backend mounts under /api/* behind strip-prefix middleware; OpenAPI paths
          # are bare (e.g. /Admin/Cache). Without this override, schemathesis hits
          # the PWA nginx (returns 405/200 HTML), not the backend.
          schemathesis-base-url: https://yay-tsa.com/api
          # Rate-limited endpoints cannot be fuzzed: after a handful of requests
          # they return 429, which schemathesis reads as "invalid data accepted"
          # (429 is not in its expected-rejection set). Their input validation is
          # covered by backend integration tests instead. SSE/event streams are
          # excluded because they never return a fuzzable JSON body.
          # /Sessions/Logout is excluded because fuzzing it with the run's live
          # Bearer token revokes that token mid-run and every later operation
          # 401s (self-DoS); /Users/Password for the same reason plus the risk
          # of locking the shared QA account. Both are covered by integration
          # tests and the crawler's real login flow.
          schemathesis-exclude-paths: '/Items/{itemId}/Images/{imageType},/v1/me/devices/events,/v1/me/devices/commands,/v1/groups/{groupId}/events,/Karaoke/{trackId}/status/stream,/Users/AuthenticateByName,/v1/groups/join,/mcp,/Sessions/Logout,/Users/Password'
          # Unknown query params are ignored by design (standard REST behavior),
          # so negative_data_rejection only reports noise (x-schemathesis-unknown-property
          # accepted with 200). Keep the action's own defaults when overriding.
          schemathesis-exclude-checks: 'ignored_auth,unsupported_method,negative_data_rejection'

          zap-enabled: 'true'
          # AuthRateLimitFilter answers ZAP's SQLi probes on the login endpoint with
          # 429 after 10 failed attempts, and Spring Security rejects unauthenticated
          # requests to every path requiring auth with a consistent 401 before any
          # handler/DB runs (SecurityConfig's `.anyRequest().authenticated()` — this
          # covers /Items too, even though its controller takes a nullable
          # `principal: Principal?`, because the FILTER CHAIN rejects it before the
          # controller ever runs). Both are the same false-positive shape: ZAP reads
          # the consistent differential as boolean-based SQLi evidence. Downgrade
          # HIGHs confined to these auth-gated path PREFIXES to non-blocking info
          # (autoqa #7) — every method under /v1/me/devices (JellyfinDevicesController)
          # and /Sessions/Playing (JellyfinSessionsController) takes `principal:
          # Principal`, and /Items requires auth via SecurityConfig regardless of its
          # own nullable parameter, so the whole prefix shares the identical security
          # posture, not just the one sub-path ZAP happened to hit this run.
          zap-rate-limited-paths: '/api/Users/AuthenticateByName,/api/v1/me/devices,/api/Sessions/Playing,/api/Items'

          crawler-enabled: 'true'
          crawler-username: ${{ vars.QA_USERNAME || 'test' }}
          crawler-password: ${{ secrets.QA_PASSWORD }}
          crawler-max-pages: '30'
          # Album cover art is optional: a missing /Items/<id>/Images/Primary is a
          # correct 404 (UI renders a placeholder), and each per-album id keeps it
          # from settling into the crawler baseline. Downgrade those 4xx to
          # non-blocking info instead of failing the gate (autoqa #11).
          crawler-decorative-paths: '/Images/'
          # ZAP HIGH gating is owned by the autoqa step above (zap-fail-on-violations
          # defaults true). The previous standalone "Gate on ZAP HIGH findings" step
          # duplicated that gate and ignored zap-rate-limited-paths, defeating autoqa
          # #7; removed so a rate-limited-endpoint HIGH FP can be tuned in one place.

          # Zero-FP by construction (M1-M6 checks: mojibake, tofu glyphs, adjacent
          # duplicates, filename-leak titles, placeholder text, degenerate rows) —
          # promote from advisory to a real gate instead of leaving every P0 finding
          # silently informational.
          mechanical-fail-on-violations: 'true'

          # Scores existing security headers (CSP, HSTS, X-Frame-Options, etc.) —
          # already hardened in nginx.conf.template, so this should pass at B+ or
          # better; catches header regressions the crawler/ZAP don't check for.
          observatory-enabled: 'true'
          observatory-fail-grade: 'B'

          # Chaos/random-interaction testing hunting crashes, uncaught JS errors and
          # 5xx that scripted crawling won't stumble into. Advisory only (default
          # monkey-fail-on-violations: false) — exploration is inherently variable,
          # so this surfaces findings without blocking on run-to-run noise.
          monkey-enabled: 'true'
          monkey-duration-ms: '180000'

          # BOLA / OWASP API1:2023 two-token matrix. This is what surfaced a real
          # production vulnerability (getPlaylistItems leaked any private playlist's
          # tracks to any authenticated user, fixed alongside this change) — verifies
          # the fix holds and catches any future regression on any owned resource
          # added to authz-resource-paths. user2/user3 are dedicated QA-only accounts
          # (never real user data); the resource is a private playlist owned by user2.
          authz-enabled: 'true'
          authz-user-a-body: '{"Username":"${{ vars.QA_USERNAME_2 }}","Pw":"${{ secrets.QA_PASSWORD_2 }}"}'
          authz-user-b-body: '{"Username":"${{ vars.QA_USERNAME_3 }}","Pw":"${{ secrets.QA_PASSWORD_3 }}"}'
          authz-resource-paths: '/api/Playlists/ae8ca971-52c7-471c-952d-14d3516ec209/Items'

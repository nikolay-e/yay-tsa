name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

# Cancel superseded PR runs, but queue pushes to main: cancelling a main run
# after the image push but before post-deploy QA would deploy unverified code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install dependencies
        run: npm ci

      - name: Cache pre-commit hooks
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          # Fall back to any prior cache when the config hash changes so hook
          # environments are reused across runs (all hook repos are public or
          # vendored locally, so a cold cache miss rebuilds cleanly).
          restore-keys: |
            pre-commit-

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  lighthouse:
    name: Performance Budget
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun

      - name: Check bundle size budget
        run: npx bundlewatch --config .bundlewatchrc.json

      - name: Enforce total bundle budget
        run: node scripts/bundle-report.mjs --max-total-gzip=210

  web-e2e-mocked:
    name: Web E2E (mocked, backend-free)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Cache npm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build core + platform (the dev server resolves them at runtime)
        run: npm run build:core && npm run build:platform

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run backend-free auth-persistence suite
        run: npx playwright test --project=chromium-mocked
        working-directory: apps/web

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-mocked
          path: apps/web/playwright-report
          retention-days: 3
          if-no-files-found: ignore

  build-android-apk:
    name: Build Android APK
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        working-directory: apps/android-twa
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > keystore.jks
          echo "KEYSTORE_FILE=$(pwd)/keystore.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        working-directory: apps/android-twa
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          path: apps/android-twa/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
          if-no-files-found: error

  docker-build-frontend:
    name: Build Frontend Image
    # pre-commit gates again: its previously-private no-emoji/shift-commit-time hooks are now
    # vendored as repo: local hooks (.pre-commit-hooks/), so the job no longer depends on the
    # deleted github.com/nikolay-e/pre-commit-hooks repo and passes on a cold runner cache.
    needs: [pre-commit, lighthouse, web-e2e-mocked, build-android-apk]
    # All test jobs must pass before an image is pushed (it auto-deploys).
    # The APK is tolerated as skipped (PRs) but never as failed.
    # DTO drift is checked by the dto-drift-check hook inside the pre-commit job.
    if: >-
      ${{ !cancelled() &&
          needs.pre-commit.result == 'success' &&
          needs.lighthouse.result == 'success' &&
          needs.web-e2e-mocked.result == 'success' &&
          needs.build-android-apk.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Android APK
        if: needs.build-android-apk.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-apk
          path: apps/web/public/downloads

      - name: Rename APK
        if: needs.build-android-apk.result == 'success'
        run: mv apps/web/public/downloads/app-release.apk apps/web/public/downloads/yay-tsa.apk

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: frontend
          context: .
          dockerfile: apps/web/Dockerfile
          target: production
          build-args: APP_ENVIRONMENT=production
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  audio-ml-test:
    name: Audio ML Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: services/audio-ml/requirements/test.txt

      - name: Install test dependencies
        working-directory: services/audio-ml
        run: pip install -r requirements/test.txt

      - name: Run pytest
        working-directory: services/audio-ml
        run: pytest tests/

  docker-build-audio-separator:
    name: Build Audio Separator Image
    needs: [pre-commit, audio-ml-test]
    # This image auto-deploys (ArgoCD Image Updater tracks audio-separator in
    # yay-tsa-production, same as the frontend image), so its own test suite
    # must pass before an image is pushed — same invariant as
    # docker-build-frontend above, just scoped to this image's own tests.
    if: ${{ !cancelled() && needs.pre-commit.result == 'success' && needs.audio-ml-test.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: audio-separator
          context: ./services/audio-ml
          build-args: VARIANT=gpu
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu
            type=gha,scope=audio-separator
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/audio-separator:buildcache-gpu,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  docker-build-feature-extractor:
    name: Build Feature Extractor Image
    needs: [pre-commit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build and push
        uses: ./.github/actions/docker-build
        with:
          image-name: feature-extractor
          context: ./services/audio-ml
          build-args: VARIANT=essentia
          include-git-sha: 'false'
          free-disk-space: 'true'
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia
            type=gha,scope=feature-extractor
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/feature-extractor:buildcache-essentia,mode=max,image-manifest=true
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

  post-deploy-qa:
    name: Post-Deploy QA
    needs: [docker-build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Schemathesis --checks all (Coverage + Fuzzing + Stateful) alone runs ~60min
    # against the live backend when chronic endpoints fail (Hypothesis shrinking),
    # which at timeout-minutes:60 left no budget for crawler/axe/ZAP — they never
    # ran and the job was SIGTERM'd mid-Stateful. 120 lets the full suite finish.
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      # The local wait-backend-rollout composite action below needs the repo on
      # disk; fetch-depth:0 also lets the step below walk history to find the
      # last commit that rebuilt the backend.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # The frontend image pushed above auto-deploys via Argo CD Image Updater
      # (Strategy 1). The build bakes VITE_APP_VERSION=main-<sha7> into the
      # eager JS chunks, so the live version is detectable by grepping the
      # assets referenced from index.html. QA must not start until the site
      # serves THIS commit, otherwise it validates the previous deploy.
      # (Backend rolls out from v2-ci.yml, which has its own post-deploy job.)
      - name: Wait for frontend rollout
        env:
          BASE_URL: https://yay-tsa.com
        run: |
          EXPECTED="main-${GITHUB_SHA:0:7}"
          DEADLINE=$((SECONDS + 1500))
          echo "Polling ${BASE_URL} until it serves frontend version ${EXPECTED}"
          while [ "$SECONDS" -lt "$DEADLINE" ]; do
            ASSETS=$(curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}/index.html?rollout=$(date +%s)" \
              | grep -oE '/assets/[A-Za-z0-9._-]+\.js' | sort -u || true)
            for ASSET in $ASSETS; do
              if curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}${ASSET}" | grep -q "$EXPECTED"; then
                echo "Live frontend serves ${EXPECTED} (found in ${ASSET})"
                exit 0
              fi
            done
            echo "Live frontend is not on ${EXPECTED} yet; retrying in 20s"
            sleep 20
          done
          echo "::error::Rollout never happened: ${BASE_URL} still does not serve ${EXPECTED} after 25 minutes (Image Updater lag or ArgoCD sync failure). QA was not reached, so this is a deploy failure, not a QA failure."
          exit 1

      # Schemathesis fuzzes /api/* (the backend). When a push also changes the
      # Kotlin backend, its image rolls out independently of the frontend, so QA
      # that starts on the frontend signal alone can hit the backend mid-rollout
      # and report transient 502s (Cloudflare HTML) as conformance failures.
      # /System/Info/Public echoes BuildSha (=main-<sha7>); wait for it AND
      # three consecutive healthy reads so the backend is settled before fuzzing.
      #
      # The backend image is rebuilt ONLY when v2-ci.yml's path filter matches
      # (yay-tsa-v2/**, charts/yay-tsa-v2/**, the v2-ci workflow). A frontend- or
      # docs-only push never produces a main-<this-sha> backend image, so waiting
      # for the current SHA would time out forever. Resolve the SHA of the last
      # commit that actually rebuilt the backend and wait for THAT instead.
      - name: Resolve expected backend SHA
        id: backend-sha
        run: |
          BACKEND_SHA=$(git log -1 --format=%H -- \
            yay-tsa-v2 charts/yay-tsa-v2 .github/workflows/v2-ci.yml)
          if [ -z "$BACKEND_SHA" ]; then
            echo "::warning::No backend-touching commit found in history; falling back to ${GITHUB_SHA}"
            BACKEND_SHA="$GITHUB_SHA"
          fi
          echo "Expected backend rollout: main-${BACKEND_SHA:0:7} (from ${BACKEND_SHA})"
          echo "sha=${BACKEND_SHA}" >> "$GITHUB_OUTPUT"

      - name: Wait for backend rollout
        uses: ./.github/actions/wait-backend-rollout
        with:
          base-url: https://yay-tsa.com
          commit-sha: ${{ steps.backend-sha.outputs.sha }}

      - name: Run AutoQA (Schemathesis + ZAP + crawler + axe)
        uses: nikolay-e/autoqa@426f577104eb9dfa23e6b5f0efc519d9c845b176 # main (feat: baseline-fail-on-new mode + monkey console-ignore)
        with:
          url: https://yay-tsa.com
          auth-url: /api/Users/AuthenticateByName
          auth-body: '{"Username":"${{ vars.QA_USERNAME || ''test'' }}","Pw":"${{ secrets.QA_PASSWORD }}"}'

          # This job only ever runs on push to main, where the stock baseline
          # gate absorbs NEW crawler findings into the baseline and merely
          # warns — it could never block. Alarm-once instead: a regression
          # fails this one run, the updated baseline keeps the next run green.
          baseline-fail-on-new: 'true'

          schemathesis-enabled: 'true'
          openapi-url: /api/v3/api-docs
          # Backend mounts under /api/* behind strip-prefix middleware; OpenAPI paths
          # are bare (e.g. /Admin/Cache). Without this override, schemathesis hits
          # the PWA nginx (returns 405/200 HTML), not the backend.
          schemathesis-base-url: https://yay-tsa.com/api
          # Rate-limited endpoints cannot be fuzzed: after a handful of requests
          # they return 429, which schemathesis reads as "invalid data accepted"
          # (429 is not in its expected-rejection set). Their input validation is
          # covered by backend integration tests instead. SSE/event streams are
          # excluded because they never return a fuzzable JSON body.
          schemathesis-exclude-paths: '/Items/{itemId}/Images/{imageType},/v1/me/devices/events,/v1/me/devices/commands,/v1/groups/{groupId}/events,/Karaoke/{trackId}/status/stream,/Users/AuthenticateByName,/v1/groups/join,/mcp'

          zap-enabled: 'true'
          # AuthRateLimitFilter answers ZAP's SQLi probes on the login endpoint with
          # 429 after 10 failed attempts, and Spring Security rejects unauthenticated
          # requests to every path requiring auth with a consistent 401 before any
          # handler/DB runs (SecurityConfig's `.anyRequest().authenticated()` — this
          # covers /Items too, even though its controller takes a nullable
          # `principal: Principal?`, because the FILTER CHAIN rejects it before the
          # controller ever runs). Both are the same false-positive shape: ZAP reads
          # the consistent differential as boolean-based SQLi evidence. Downgrade
          # HIGHs confined to these auth-gated path PREFIXES to non-blocking info
          # (autoqa #7) — every method under /v1/me/devices (JellyfinDevicesController)
          # and /Sessions/Playing (JellyfinSessionsController) takes `principal:
          # Principal`, and /Items requires auth via SecurityConfig regardless of its
          # own nullable parameter, so the whole prefix shares the identical security
          # posture, not just the one sub-path ZAP happened to hit this run.
          zap-rate-limited-paths: '/api/Users/AuthenticateByName,/api/v1/me/devices,/api/Sessions/Playing,/api/Items'

          crawler-enabled: 'true'
          crawler-username: ${{ vars.QA_USERNAME || 'test' }}
          crawler-password: ${{ secrets.QA_PASSWORD }}
          crawler-max-pages: '30'
          # Album cover art is optional: a missing /Items/<id>/Images/Primary is a
          # correct 404 (UI renders a placeholder), and each per-album id keeps it
          # from settling into the crawler baseline. Downgrade those 4xx to
          # non-blocking info instead of failing the gate (autoqa #11).
          crawler-decorative-paths: '/Images/'
          # ZAP HIGH gating is owned by the autoqa step above (zap-fail-on-violations
          # defaults true). The previous standalone "Gate on ZAP HIGH findings" step
          # duplicated that gate and ignored zap-rate-limited-paths, defeating autoqa
          # #7; removed so a rate-limited-endpoint HIGH FP can be tuned in one place.

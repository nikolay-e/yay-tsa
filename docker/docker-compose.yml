# Yay-Tsa - Self-Hosted Music Streaming
#
# Quick start:
#   1. Copy example.env to .env and configure MEDIA_PATH
#   2. docker compose up -d
#
# Optional services:
#   docker compose --profile karaoke up -d   # Enable vocal separation (GPU recommended)
#
# Upgrade:
#   docker compose pull && docker compose up -d

services:
  database:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-yaytsa}
      POSTGRES_USER: ${DB_USER:-yaytsa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-yaytsa} -d ${DB_NAME:-yaytsa}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/nikolay-e/yay-tsa/yay-tsa-v2/backend:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-yaytsa}
      DB_USERNAME: ${DB_USER:-yaytsa}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      CORS_ENABLED: true
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MUSIC_PATH: /media
      KARAOKE_SEPARATOR_URL: http://audio-separator:8000
      KARAOKE_OUTPUT_PATH: /app/stems
      KARAOKE_ENABLED: ${KARAOKE_ENABLED:-false}
      # Production uses the HTTP separator sidecar, not in-process Demucs.
      DEMUCS_COMMAND: unsupported
      ML_ENABLED: ${ML_ENABLED:-false}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      MPD_ENABLED: ${MPD_ENABLED:-false}
    volumes:
      - ${MEDIA_PATH:?Set MEDIA_PATH in .env}:/media:ro
      - karaoke_stems:/app/stems
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/manage/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ghcr.io/nikolay-e/yay-tsa/frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:80'
    environment:
      YAYTSA_BACKEND_URL: http://backend:8080
      YAYTSA_SERVER_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/health']
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s

  audio-separator:
    image: ghcr.io/nikolay-e/yay-tsa/audio-separator:${APP_VERSION:-latest}
    restart: unless-stopped
    profiles:
      - karaoke
    environment:
      MODEL_NAME: ${KARAOKE_MODEL:-model_bs_roformer_ep_317_sdr_12.9755.yaml}
      OUTPUT_FORMAT: wav
      DEVICE: ${KARAOKE_DEVICE:-cpu}
    volumes:
      - ${MEDIA_PATH:?Set MEDIA_PATH in .env}:/media
      - karaoke_stems:/app/stems
    healthcheck:
      test:
        [
          'CMD',
          'python3',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
  karaoke_stems:

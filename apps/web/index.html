<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Yay-Tsa is a self-hosted music streaming PWA. Browse albums, artists, and playlists from your personal media server."
    />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Yay-Tsa</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0f0f0f;
      }
      #root:empty::before {
        content: 'Yay-Tsa';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #a3a3a3;
        font:
          600 1.5rem/1 system-ui,
          sans-serif;
        letter-spacing: 0.2em;
        animation: splash-pulse 1.2s ease-in-out 0.4s infinite alternate;
      }
      @keyframes splash-pulse {
        to {
          color: #525252;
        }
      }
    </style>
    <script src="/config.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

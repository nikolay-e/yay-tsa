spring:
  application:
    name: yaytsa

  cache:
    jcache:
      provider: com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider
    cache-names:
      - rate-limit-buckets
      - filterConfigCache
    caffeine:
      spec: maximumSize=100000,expireAfterAccess=600s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:yaytsa}
    username: ${DB_USERNAME:yaytsa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
      pool-name: yaytsa-pool

  flyway:
    enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true
          in_clause_parameter_padding: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  lifecycle:
    timeout-per-shutdown-phase: 30s

yaytsa:
  library:
    music-path: ${MUSIC_PATH:#{null}}
  media:
    root-path: ${MEDIA_ROOT_PATH:#{null}}
  mpd:
    port: ${MPD_PORT:6600}
    enabled: ${MPD_ENABLED:false}
  llm:
    enabled: ${LLM_ENABLED:false}
    model: ${LLM_MODEL:local-stub}
  ml:
    enabled: ${ML_ENABLED:false}
    extractor-script: ${ML_EXTRACTOR_SCRIPT:#{null}}
  karaoke:
    enabled: ${KARAOKE_ENABLED:false}
    output-path: ${KARAOKE_OUTPUT_PATH:#{null}}
    demucs-command: ${DEMUCS_COMMAND:demucs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /manage
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: yaytsa
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

bucket4j:
  enabled: true
  filters:
    - id: jellyfin-login
      cache-name: rate-limit-buckets
      url: ^/Users/AuthenticateByName$
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/json
      http-response-body: '{"error":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr() + ':' + getRequestURI()
          bandwidths:
            - capacity: 10
              time: 1
              unit: minutes
              refill-speed: interval
    - id: subsonic-rest
      cache-name: rate-limit-buckets
      url: ^/rest/.*
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/json
      http-response-body: '{"error":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr() + ':' + getRequestURI()
          bandwidths:
            - capacity: 10
              time: 1
              unit: minutes
              refill-speed: interval

logging:
  level:
    dev.yaytsa: INFO
    org.hibernate.SQL: WARN

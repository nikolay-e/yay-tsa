spring:
  application:
    name: yaytsa

  # One thread is the Boot default; a single long-running @Scheduled job would then
  # starve the outbox poller (SSE command/state delivery) and every other worker.
  task:
    scheduling:
      pool:
        size: 4

  cache:
    jcache:
      provider: com.github.benmanes.caffeine.jcache.spi.CaffeineCachingProvider
    cache-names:
      - rate-limit-buckets
      - filterConfigCache
    caffeine:
      spec: maximumSize=100000,expireAfterAccess=600s

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:yaytsa}
    username: ${DB_USERNAME:yaytsa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 30000
      pool-name: yaytsa-pool

  flyway:
    enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
        query:
          fail_on_pagination_over_collection_fetch: true
          in_clause_parameter_padding: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  lifecycle:
    timeout-per-shutdown-phase: 30s

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MULTIPART_MAX_FILE_SIZE:250MB}
      max-request-size: ${UPLOAD_MULTIPART_MAX_REQUEST_SIZE:260MB}

yaytsa:
  auth:
    max-failures-per-minute: ${AUTH_MAX_FAILURES_PER_MINUTE:10}
  oauth:
    public-base-url: ${OAUTH_PUBLIC_BASE_URL:https://yay-tsa.com}
    public-api-prefix: ${OAUTH_PUBLIC_API_PREFIX:/api}
  admin-bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:true}
    username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:#{null}}
    display-name: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:Administrator}
  build:
    sha: ${GIT_SHA:unknown}
  library:
    music-path: ${MUSIC_PATH:#{null}}
  upload:
    max-bytes: ${UPLOAD_MAX_BYTES:209715200}
  media:
    root-path: ${MEDIA_ROOT_PATH:#{null}}
  playback:
    play-history-dedup-window-seconds: ${PLAY_HISTORY_DEDUP_WINDOW_SECONDS:30}
  scrobbling:
    listenbrainz:
      enabled: ${LISTENBRAINZ_ENABLED:false}
      token: ${LISTENBRAINZ_TOKEN:}
      username: ${LISTENBRAINZ_USERNAME:}
      api-url: ${LISTENBRAINZ_API_URL:https://api.listenbrainz.org}
      poll-interval-ms: ${LISTENBRAINZ_POLL_INTERVAL_MS:30000}
      batch-size: ${LISTENBRAINZ_BATCH_SIZE:50}
      max-age-days: ${LISTENBRAINZ_MAX_AGE_DAYS:7}
      retry-cooldown-seconds: ${LISTENBRAINZ_RETRY_COOLDOWN_SECONDS:60}
  mpd:
    port: ${MPD_PORT:6600}
    enabled: ${MPD_ENABLED:false}
  llm:
    enabled: ${LLM_ENABLED:false}
    model: ${LLM_MODEL:GPT-5.4 Mini}
    api-key: ${LLM_API_KEY:#{null}}
    base-url: ${LLM_BASE_URL:http://litellm.litellm.svc.cluster.local:8080}
    max-tokens: ${LLM_MAX_TOKENS:1024}
  ml:
    enabled: ${ML_ENABLED:false}
    extractor-script: ${ML_EXTRACTOR_SCRIPT:#{null}}
  embedding:
    enabled: ${EMBEDDING_ENABLED:false}
    base-url: ${EMBEDDING_BASE_URL:http://yay-tsa-production-embedding-server.yay-tsa.svc.cluster.local:8000}
  karaoke:
    enabled: ${KARAOKE_ENABLED:false}
    output-path: ${KARAOKE_OUTPUT_PATH:#{null}}
    demucs-command: ${DEMUCS_COMMAND:demucs}
    separator-url: ${KARAOKE_SEPARATOR_URL:#{null}}
    fail-threshold: ${KARAOKE_FAIL_THRESHOLD:3}
  lyrics:
    lrclib:
      enabled: ${LYRICS_LRCLIB_ENABLED:true}
      base-url: ${LYRICS_LRCLIB_BASE_URL:https://lrclib.net}
  image:
    cover-cache-dir: ${IMAGE_COVER_CACHE_DIR:/app/cover-cache}
  metadata:
    enabled: ${METADATA_ENABLED:false}
    # Generic, non-identifying by default (anonymity): reveals no domain/owner to MusicBrainz,
    # Cover Art Archive, Wikimedia, iTunes, Deezer, OpenLibrary. Override METADATA_USER_AGENT with a
    # descriptive UA + contact if you need Wikimedia (403s a generic UA) or MusicBrainz's per-IP rate
    # budget (a contactless UA is throttled into their shared anonymous pool).
    user-agent: ${METADATA_USER_AGENT:Music-Metadata-Client/1.0}
    poll-interval-ms: ${METADATA_POLL_INTERVAL_MS:300000}
    batch-size: ${METADATA_BATCH_SIZE:50}
    musicbrainz-base-url: ${METADATA_MUSICBRAINZ_BASE_URL:https://musicbrainz.org/ws/2}
    coverart-base-url: ${METADATA_COVERART_BASE_URL:https://coverartarchive.org}
    artist-image-dir: ${METADATA_ARTIST_IMAGE_DIR:/app/artist-images}
    wikidata-base-url: ${METADATA_WIKIDATA_BASE_URL:https://www.wikidata.org/wiki}
    commons-api-url: ${METADATA_COMMONS_API_URL:https://commons.wikimedia.org/w/api.php}
    rate-limit-ms: ${METADATA_RATE_LIMIT_MS:1000}
    openlibrary-enabled: ${METADATA_OPENLIBRARY_ENABLED:false}
    openlibrary-base-url: ${METADATA_OPENLIBRARY_BASE_URL:https://openlibrary.org}
    openlibrary-covers-base-url: ${METADATA_OPENLIBRARY_COVERS_BASE_URL:https://covers.openlibrary.org}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /manage
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db
  metrics:
    tags:
      application: yaytsa
    distribution:
      percentiles-histogram:
        http.server.requests: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

# Failed-login brute-force limiting for /Users/AuthenticateByName and /rest/* lives in
# AuthRateLimitFilter (per-IP + per-username, consumes only on failed auth). The filters
# below are coarse volumetric caps on top of it.
bucket4j:
  enabled: true
  filters:
    - id: subsonic-rest
      cache-name: rate-limit-buckets
      url: ^/rest/.*
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/problem+json
      http-response-body: '{"title":"Too Many Requests","status":429,"detail":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr() + ':' + getRequestURI()
          bandwidths:
            - capacity: 300
              time: 1
              unit: minutes
              refill-speed: interval
    - id: group-join
      cache-name: rate-limit-buckets
      url: ^/v1/groups/join$
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/problem+json
      http-response-body: '{"title":"Too Many Requests","status":429,"detail":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 30
              time: 1
              unit: minutes
              refill-speed: interval
    - id: mcp
      cache-name: rate-limit-buckets
      url: ^/mcp.*
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/problem+json
      http-response-body: '{"title":"Too Many Requests","status":429,"detail":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 60
              time: 1
              unit: minutes
              refill-speed: interval
    - id: oauth
      cache-name: rate-limit-buckets
      url: ^/oauth/.*
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/problem+json
      http-response-body: '{"title":"Too Many Requests","status":429,"detail":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 30
              time: 1
              unit: minutes
              refill-speed: interval
    - id: client-errors
      cache-name: rate-limit-buckets
      url: ^/v1/client-errors$
      http-status-code: TOO_MANY_REQUESTS
      http-content-type: application/problem+json
      http-response-body: '{"title":"Too Many Requests","status":429,"detail":"Too many requests. Try again later."}'
      rate-limits:
        - cache-key: getRemoteAddr()
          bandwidths:
            - capacity: 30
              time: 1
              unit: minutes
              refill-speed: interval

logging:
  level:
    dev.yaytsa: INFO
    org.hibernate.SQL: WARN

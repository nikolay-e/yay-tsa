minimum_pre_commit_version: '3.7.0'
default_stages: [pre-commit]
default_language_version:
  node: 22.22.0
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: fix-byte-order-marker
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-json
      - id: check-toml
      - id: check-xml
        files: \.(xml|pom)$

  - repo: https://github.com/nikolay-e/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: no-emoji
        files: ^(packages|apps|services)/.*\.(ts|tsx|js|jsx|py|java)$

  - repo: local
    hooks:
      - id: prettier
        name: 'Prettier (code formatter + Tailwind sort)'
        entry: npx --no-install prettier --write --ignore-unknown --plugin=prettier-plugin-tailwindcss
        language: system
        types_or: [javascript, jsx, ts, tsx, css, scss, markdown, yaml, json]
        exclude: ^(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|charts/)

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.yaml]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: [-w, -i, '2']

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [-x]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args: [--config, .hadolint.yaml]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.151.0
    hooks:
      - id: semgrep
        name: semgrep (JS/TS security & best practices)
        args:
          - --config=p/javascript
          - --config=p/typescript
          - --config=p/react
          - --error
          - --skip-unknown-extensions
          - --metrics=off
        files: ^(packages|apps)/.*\.(js|ts|tsx)$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: codespell (spell checker)
        args:
          - --ignore-words-list=afterall,beforeall,aftereach,beforeeach,alltogether,errorprone,currenty,ser,shouldbe
          - --skip=package-lock.json,pnpm-lock.yaml,jellyfin-api-spec.json,node_modules,dist,build

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: yamllint (YAML linting)
        args:
          - -d
          - >-
            {extends: default,
            rules: {line-length: {max: 120},
            document-start: disable,
            indentation: disable,
            comments: disable}}
        exclude: ^(charts/.*/templates/.*\.yaml|\.github/.*\.yml)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint-docker

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.4.0
    hooks:
      - id: stylelint
        args: [--fix, --config, .stylelintrc.json]
        additional_dependencies:
          - stylelint@16.12.0
          - stylelint-config-standard@29.0.0
          - stylelint-config-recommended@13.0.0

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        name: 'ruff (Python linting + isort)'
        args: [--fix]
        files: ^services/audio-separator/.*\.py$
      - id: ruff-format
        name: 'ruff-format (Python formatting)'
        files: ^services/audio-separator/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: 'mypy (Python type checking)'
        files: ^services/audio-separator/.*\.py$
        args: [--config-file, services/audio-separator/pyproject.toml]
        additional_dependencies: [types-requests]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: 'bandit (Python security scanning)'
        files: ^services/audio-separator/.*\.py$
        exclude: ^services/audio-separator/tests/
        args: [-c, services/audio-separator/pyproject.toml]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.14
    hooks:
      - id: vulture
        name: 'vulture (Python dead code detection)'
        files: ^services/audio-separator/.*\.py$
        exclude: ^services/audio-separator/(tests|patches)/
        args:
          [
            services/audio-separator/,
            services/audio-separator/vulture_whitelist.py,
            --min-confidence=80,
          ]

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.16.0
    hooks:
      - id: pretty-format-java
        name: 'Google Java Format (autofix)'
        args: [--autofix]
        files: ^services/server/src/.*\.java$

  - repo: local
    hooks:
      - id: sort-package-json
        name: 'Sort package.json files'
        entry: npx --yes sort-package-json "package.json" "packages/*/package.json" "apps/*/package.json"
        language: system
        types: [json]
        files: '^(package\.json|packages/.*/package\.json|apps/.*/package\.json)$'

      - id: tsc-core
        name: 'TypeScript type check (core)'
        entry: npm run type-check
        language: system
        files: ^(packages|apps)/.*\.(ts|tsx)$
        pass_filenames: false

      - id: tsc-web
        name: 'TypeScript type check (web)'
        entry: bash -c 'npm run build:core && npm run build:platform && cd apps/web && npx tsc --noEmit'
        language: system
        files: ^apps/web/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: eslint
        name: 'ESLint (TypeScript/React quality)'
        entry: npx --no-install eslint --fix --no-warn-ignored
        language: system
        files: ^(packages|apps)/.*\.(js|ts|tsx)$
        exclude: (tests|\.test\.|\.spec\.|\.config\.)
        pass_filenames: true

      - id: docker-compose-check
        name: 'Docker Compose config validation'
        entry: docker compose -f docker-compose.yml config -q
        language: system
        files: ^docker-compose\.yml$
        pass_filenames: false

      - id: npm-audit
        name: 'npm audit (production security vulnerabilities)'
        entry: npm audit --audit-level=high --omit=dev
        language: system
        files: ^package(-lock)?\.json$
        pass_filenames: false
        stages: [pre-push]

      - id: commitlint
        name: 'Commitlint (conventional commits)'
        entry: npx --no-install commitlint --edit
        language: system
        stages: [commit-msg]
        always_run: true

      - id: knip
        name: 'Knip (unused code detection)'
        entry: npx --no-install knip --no-progress --exclude unresolved
        language: system
        files: ^(packages|apps)/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: jscpd
        name: 'Copy-paste detection (jscpd)'
        entry: >-
          npx --no-install jscpd --min-lines 6 --min-tokens 50 --threshold 3
          --ignore "**/tests/**,**/node_modules/**,**/dist/**,**/build/**"
          packages/ apps/
        language: system
        files: \.(js|ts|tsx)$
        pass_filenames: false

      - id: type-coverage
        name: 'Type coverage (>=90%)'
        entry: npx --no-install type-coverage --at-least 90 --ignore-catch
        language: system
        files: ^(packages|apps)/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: no-console
        name: 'No console.log in production'
        entry: >-
          bash -c 'grep -rn "console\.\(log\|debug\)" apps/web/src/{features,routes,components}
          --include="*.ts" --include="*.tsx" 2>/dev/null && exit 1 || exit 0'
        language: system
        files: ^apps/web/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: component-naming
        name: 'Component naming convention (PascalCase)'
        entry: >-
          bash -c 'find apps/web/src -name "*.tsx" -exec basename {} \; |
          grep -vE "^[A-Z]|^(index|main|vite-env)" && exit 1 || exit 0'
        language: system
        files: ^apps/web/src/.*\.tsx$
        pass_filenames: false

      - id: maven-compile
        name: 'Maven compile (Java backend)'
        entry: bash -c 'cd services/server && mvn compile -B -q'
        language: system
        files: ^services/server/(pom\.xml|src/.*)$
        pass_filenames: false

      - id: maven-spotbugs
        name: 'SpotBugs (Java static analysis)'
        entry: bash -c 'cd services/server && mvn spotbugs:check -B -q'
        language: system
        files: ^services/server/src/main/.*\.java$
        pass_filenames: false
        stages: [pre-push]

      - id: maven-pmd
        name: 'PMD (Java code quality)'
        entry: bash -c 'cd services/server && mvn pmd:check -B -q -Dpmd.failOnViolation=true'
        language: system
        files: ^services/server/src/main/.*\.java$
        pass_filenames: false
        stages: [pre-push]

  - repo: https://github.com/nikolay-e/pre-commit-hooks
    rev: v2.1.0
    hooks:
      - id: shift-commit-time
        stages: [post-commit]

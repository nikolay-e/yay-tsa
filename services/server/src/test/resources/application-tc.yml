spring:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: false

yaytsa:
  media:
    library:
      roots: ./test-media
    images:
      cache-directory: /tmp/yaytsa-test-images
    karaoke:
      separator-url: http://localhost:19999
    feature-extraction:
      url: http://localhost:19998

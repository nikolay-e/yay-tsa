{{/*
Separate ingress for PWA static assets that should be accessible without authentication.
manifest.json and service-worker.js must be publicly accessible for PWA functionality.
*/}}
{{- if and .Values.ingress.enabled .Values.ingress.pwaAssetsPublic }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "yay-tsa.fullname" . }}-pwa
  labels:
    {{- include "yay-tsa.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "100"
    {{- with .Values.ingress.additionalMiddlewares }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ join "," . }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- include "yay-tsa-common.ingress.tls" (dict "tls" .Values.ingress.tls) | nindent 2 }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /manifest.webmanifest
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /sw.js
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /registerSW.js
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /robots.txt
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /favicon.ico
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          - path: /favicon.svg
            pathType: Exact
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}

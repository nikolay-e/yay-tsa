{{/*
Frontend ingress — routes / to the PWA nginx (which proxies /api to the
backend internally). The backend's own ingresses live in charts/yay-tsa-v2.
*/}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "yay-tsa.fullname" . }}
  labels:
    {{- include "yay-tsa.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- include "yay-tsa-common.ingress.tls" (dict "tls" .Values.ingress.tls) | nindent 2 }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # Frontend - serves SPA
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "yay-tsa.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
{{- end }}

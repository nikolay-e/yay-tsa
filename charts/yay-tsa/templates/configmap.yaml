apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yay-tsa.fullname" . }}
  labels:
    {{- include "yay-tsa.labels" . | nindent 4 }}
data:
  {{- if .Values.config.serverUrl }}
  YAYTSA_SERVER_URL: {{ tpl (.Values.config.serverUrl | toString) . | quote }}
  {{- end }}
  {{- if .Values.config.backendUrl }}
  # Internal K8s service URL for nginx proxying (bypasses public ingress).
  # Templated so an umbrella can wire it to the in-release backend Service.
  YAYTSA_BACKEND_URL: {{ tpl (.Values.config.backendUrl | toString) . | quote }}
  {{- end }}
  YAYTSA_CLIENT_NAME: {{ .Values.config.clientName | quote }}
  YAYTSA_DEVICE_NAME: {{ .Values.config.deviceName | quote }}
  YAYTSA_LOG_LEVEL: {{ .Values.config.logLevel | default "error" | quote }}
  APP_VERSION: {{ .Chart.AppVersion | quote }}
  {{- if .Values.config.androidCertSha256 }}
  ANDROID_CERT_SHA256: {{ .Values.config.androidCertSha256 | quote }}
  {{- end }}

{{- if .Values.featureExtractor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "yay-tsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: feature-extractor
  name: {{ include "yay-tsa.fullname" . }}-feature-extractor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "yay-tsa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: feature-extractor
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "yay-tsa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: feature-extractor
    spec:
      {{- if .Values.imagePullSecrets }}
      {{- include "yay-tsa-common.deployment.imagePullSecrets" . | nindent 6 }}
      {{- end }}
      {{- if .Values.featureExtractor.podSecurityContext }}
      {{- include "yay-tsa-common.deployment.podSecurityContext" (dict "securityContext" .Values.featureExtractor.podSecurityContext) | nindent 6 }}
      {{- end }}
      containers:
        - name: feature-extractor
          image: "{{ .Values.featureExtractor.image.repository }}:{{ .Values.featureExtractor.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.featureExtractor.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.featureExtractor.service.port }}
              name: http
              protocol: TCP
          env:
            - name: ESSENTIA_MODELS_DIR
              value: /app/models
            - name: MEDIA_PATH
              value: /media
          {{- with .Values.featureExtractor.probes.startup }}
          startupProbe:
            httpGet:
              path: {{ .path }}
              port: http
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- include "yay-tsa-common.deployment.standardProbes" (dict "port" "http" "liveness" .Values.featureExtractor.probes.liveness "readiness" .Values.featureExtractor.probes.readiness) | nindent 10 }}
          resources:
            {{- toYaml .Values.featureExtractor.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.featureExtractor.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            {{- if .Values.featureExtractor.media.enabled }}
            - name: media
              mountPath: /media
              readOnly: true
            {{- end }}
      restartPolicy: Always
      volumes:
        - name: tmp-volume
          emptyDir: {}
        {{- if .Values.featureExtractor.media.enabled }}
        - name: media
          hostPath:
            path: {{ .Values.featureExtractor.media.hostPath }}
            type: Directory
        {{- end }}
{{- end }}

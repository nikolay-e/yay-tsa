{{- if .Values.embeddingServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "yay-tsa.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedding-server
  name: {{ include "yay-tsa.fullname" . }}-embedding-server
spec:
  ports:
    - name: http
      port: {{ .Values.embeddingServer.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    {{- include "yay-tsa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: embedding-server
  type: {{ .Values.embeddingServer.service.type }}
{{- end }}

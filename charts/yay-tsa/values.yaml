replicaCount: 1

autoscaling:
  enabled: false

# Off by default for portability: the policy hardcodes the author's cluster topology
# (Traefik in kube-system, the v2 backend namespace). Enable on a policy-enforcing CNI
# whose layout matches, or leave disabled.
networkPolicy:
  enabled: false

frontend:
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/frontend
    pullPolicy: IfNotPresent
    tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

config:
  serverUrl: ''
  # Internal cluster URL the PWA nginx proxies /api to. Supports Helm templating
  # (e.g. the yay-tsa-stack umbrella sets "http://{{ .Release.Name }}-yay-tsa-v2-backend").
  backendUrl: ''
  clientName: 'Yay-Tsa'
  deviceName: 'Yay-Tsa Web'
  logLevel: 'error'
  androidCertSha256: ''

serviceAccount:
  create: false
  annotations: {}
  name: ''

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 101

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  additionalMiddlewares: []
  pwaAssetsPublic: false
  hosts:
    - host: yay-tsa.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - yay-tsa.example.com
      secretName: yay-tsa-tls

resources:
  requests:
    cpu: 10m
    memory: 64Mi
    ephemeral-storage: 100Mi
  limits:
    cpu: '1'
    memory: 256Mi
    ephemeral-storage: 500Mi

probes:
  type: http
  liveness:
    path: /health
    port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# This chart ships the PWA frontend + audio-separator (karaoke) sidecar.
# The backend lives in `charts/yay-tsa-v2/` (Kotlin hexagonal).

# Batch ML feature extraction CronJob (essentia image). Disabled by default;
# enabled in prod values. Fills core_v2_ml.track_features for unprocessed tracks.
featureExtractor:
  enabled: false
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/feature-extractor
    pullPolicy: IfNotPresent
    tag: ''
  schedule: '0 3 * * *' # daily at 03:00
  activeDeadlineSeconds: 21600 # 6h cap per run
  # Keep only the latest failed Job and auto-GC finished Jobs after 24h so a
  # transient nightly failure can't accumulate stale KubeJobFailed alerts.
  failedJobsHistoryLimit: 1
  ttlSecondsAfterFinished: 86400 # 24h
  extractorVersion: 'essentia-1.1+clap+mert'
  batchLimit: 0 # 0 = process every pending track in one run
  hfCacheSize: '8Gi'
  database:
    secretName: yay-tsa-postgres
  media:
    hostPath: /mnt/t7-music
  # CLAP/MERT embeddings run on GPU; Essentia/TF DSP stays on CPU.
  device: 'cuda'
  nodeSelector: {}
  # Requesting nvidia.com/gpu pins the pod to the GPU node; the node taint needs
  # this toleration to let a non-GPU-dedicated batch job land there.
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  affinity: {}
  resources:
    requests:
      memory: '4Gi'
      cpu: '1'
    limits:
      memory: '10Gi'
      cpu: '4'
      nvidia.com/gpu: 1

# Per-user taste clustering CronJob (PCA + dynamic-k k-means on MERT embeddings).
# Writes core_v2_ml.taste_clusters; radio seeds read the medoids. DB-only.
tasteClusters:
  enabled: false
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/feature-extractor
    pullPolicy: IfNotPresent
    tag: ''
  schedule: '0 5 * * *' # daily at 05:00 (after lyrics-sync at 04:00)
  activeDeadlineSeconds: 3600 # 1h cap
  failedJobsHistoryLimit: 1
  ttlSecondsAfterFinished: 86400 # 24h
  database:
    secretName: yay-tsa-postgres
  nodeSelector: {}
  resources:
    requests:
      memory: '512Mi'
      cpu: '250m'
    limits:
      memory: '2Gi'
      cpu: '2'

# Periodic lyrics re-check CronJob (reuses the feature-extractor essentia image;
# only needs its requests + psycopg2). Upgrades plain/missing .lrc to synced.
lyricsSync:
  enabled: false
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/feature-extractor
    pullPolicy: IfNotPresent
    tag: ''
  schedule: '0 4 * * *' # daily at 04:00 (after the feature-extractor at 03:00)
  activeDeadlineSeconds: 14400 # 4h cap
  failedJobsHistoryLimit: 1
  ttlSecondsAfterFinished: 86400 # 24h
  batchLimit: 0 # 0 = every track
  database:
    secretName: yay-tsa-postgres
  media:
    hostPath: /mnt/t7-music
  nodeSelector: {}
  resources:
    requests:
      memory: '256Mi'
      cpu: '50m'
    limits:
      memory: '1Gi'
      cpu: '1'

audioSeparator:
  enabled: false
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/audio-separator
    pullPolicy: IfNotPresent
    tag: ''
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: '2Gi'
      cpu: '500m'
    limits:
      memory: '4Gi'
      nvidia.com/gpu: 1
  config:
    modelName: 'model_bs_roformer_ep_317_sdr_12.9755.yaml'
    outputFormat: 'mp3'
    outputBitrate: '192k'
    device: 'cuda'
    stemsOutputRoot: '/app/stems'
  stemsStorage:
    enabled: true
    size: '10Gi'
    storageClass: 'local-path'
  probes:
    liveness:
      path: /health
      port: 8000
      initialDelaySeconds: 300
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      path: /health
      port: 8000
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 10
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  media:
    enabled: false
    hostPath: ''

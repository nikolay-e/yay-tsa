imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

nodeSelector: {}
tolerations: []
affinity: {}

backend:
  enabled: true
  image:
    repository: ghcr.io/nikolay-e/yay-tsa/yay-tsa-v2/backend
    pullPolicy: IfNotPresent
    tag: ''
  # HARD INVARIANT: keep at 1. The backend holds per-JVM state — device-presence projection
  # (in-memory map), Caffeine token/rate-limit caches, and a @Scheduled LlmOrchestrator that has
  # no leader election. Scaling >1 replica double-runs the orchestrator (double LLM cost/edits) and
  # diverges presence/rate-limit across pods. Before raising this: add ShedLock to the scheduler,
  # back device presence + rate-limit with the DB, and the token cache tolerates per-pod TTL.
  replicaCount: 1
  revisionHistoryLimit: 5

  management:
    port: 9090

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      memory: '1Gi'
      cpu: '500m'
      ephemeral-storage: '1Gi'
    limits:
      memory: '2Gi'
      cpu: '2'
      ephemeral-storage: '5Gi'

  jvm:
    opts: >-
      -XX:+UseContainerSupport
      -XX:MaxRAMPercentage=75.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:+ExitOnOutOfMemoryError

  probes:
    # startupProbe gates liveness/readiness so a slow JVM cold-start (image pull + Flyway +
    # Hikari) is never killed mid-boot. failureThreshold*periodSeconds = max startup budget (150s).
    # Actuator listens on the dedicated management port (kubelet probes hit the pod directly,
    # so the management port never needs Service/Ingress exposure).
    startup:
      path: /manage/health/liveness
      port: 9090
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      # ~5 min budget (60*5s): a JVM cold start + Flyway across 9 schemas on a small/
      # CPU-constrained node (the typical self-host target) can exceed 150s and otherwise
      # looks like CrashLoopBackOff on first install.
      failureThreshold: 60
    liveness:
      path: /manage/health/liveness
      port: 9090
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /manage/health/readiness
      port: 9090
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  database:
    # Resolution order for the DB connection Secret (must contain keys POSTGRES_HOST,
    # POSTGRES_PORT, POSTGRES_USER, POSTGRES_PASSWORD):
    #   1. existingSecret      (BYO; highest priority)
    #   2. secretName          (legacy BYO alias; the production GitOps path)
    #   3. global.yaytsaDatabase.secretName  (set by the yay-tsa-stack umbrella's bundled DB)
    #   4. a Secret this chart renders from the host/port/user/password fields below
    existingSecret: ''
    secretName: 'yay-tsa-postgres'
    name: 'yaytsa_production'
    # Used only when this chart renders its own DB Secret (cases 1–3 above all empty):
    host: ''
    port: 5432
    user: 'yaytsa'
    password: ''
    hikari:
      maximumPoolSize: 10
      minimumIdle: 5

  # First-admin bootstrap. The backend seeds one admin on an empty database (idempotent,
  # fail-closed: no password => no admin, never an insecure default).
  adminBootstrap:
    enabled: true
    username: admin
    password: ''
    displayName: Administrator
    # BYO secret carrying the admin password; takes precedence over .password above.
    existingSecret: ''
    existingSecretKey: ADMIN_BOOTSTRAP_PASSWORD

  config:
    profile: 'prod'
    logLevel: 'INFO'
    appLogLevel: 'INFO'
    corsEnabled: true
    # Comma-separated allowed origins. Empty by default (same-origin deploys, e.g. the PWA
    # served behind the same host with an /api proxy, need none). Set to your public URL(s)
    # for cross-origin clients.
    corsOrigins: ''
    # Set when karaoke is enabled; defaults empty. The yay-tsa-stack umbrella wires this to
    # the bundled audio-separator Service.
    karaokeSeparatorUrl: ''
    demucsCommand: 'unsupported'
    libraryMusicPath: '/media'
    karaoke:
      enabled: false
      outputPath: '/app/stems'
      failThreshold: 3
    ml:
      enabled: false
      extractorScript: '' # path to in-container Python feature-extractor (absent = disabled)
      processTimeoutSeconds: 600
      batchSize: 50
    image:
      # Materialized embedded cover art (scan time) + audiobook/Open Library covers (enricher) land here
      # instead of the (often read-only) media mount, so imageTags and the Images endpoint agree by
      # construction. Mounted as a writable emptyDir below (backend.coverCache); re-derivable on rescan.
      coverCacheDir: '/app/cover-cache'
    metadata:
      enabled: false # MusicBrainz ID + Cover Art Archive enrichment; writes cover.jpg into album folders
      userAgent: 'Yaytsa/1.0 ( https://yay-tsa.com )'
      pollIntervalMs: 300000
      batchSize: 50
      # Artists are not filesystem folders, so fetched/derived artist images are cached here instead
      # of in the (often read-only) media mount. Served via /Items/{artistId}/Images/Primary. Mounted
      # as a writable emptyDir below (backend.artistImages) since the root filesystem is read-only.
      artistImageDir: '/app/artist-images'
      # Last-resort keyless open-source book-cover fallback for audiobooks (Open Library search.json ->
      # covers.openlibrary.org). Default OFF: this library's "audiobooks" are largely Russian music in
      # Cover Art Archive, not ISBN books. Enable only if genuine book audiobooks are present.
      openLibraryEnabled: false
    llm:
      enabled: false # adaptive LLM-DJ; routes through the in-cluster LiteLLM gateway
      model: 'GPT-5.4 Mini' # LiteLLM model_name alias (maps to openai/gpt-5.4-mini)
      baseUrl: 'http://litellm.litellm.svc.cluster.local:8080'
      apiKeySecret: 'yay-tsa-production-secrets'
      apiKeySecretKey: 'LLM_API_KEY'
      gatewayPort: 8080
    mpd:
      enabled: false
      port: 6600
    scrobbling:
      listenbrainz:
        enabled: false # submits completed plays to ListenBrainz; requires a user token
        # BYO Secret holding the ListenBrainz user token. The env var is wired with
        # optional:true, so the Secret key may land before or after the enable flip.
        # WARNING: an enabled submitter with a WRONG (non-blank) token gets 401s and
        # permanently drops listens; a BLANK token merely skips with a single warning.
        tokenSecret: ''
        tokenSecretKey: 'LISTENBRAINZ_TOKEN'
    lyrics:
      lrclib:
        enabled: true # keyless public lyrics provider (lrclib.net)

  # Writable store for artist images (keyless MusicBrainz->Wikidata->Commons photo, or album-cover
  # fallback). When media is enabled these live on the SAME persistent volume as the library (under
  # mediaSubPath), so externally-fetched artist photos survive pod restarts — the enricher marks each
  # entity checked and does NOT re-derive, so an emptyDir silently loses them forever on restart. With
  # media disabled it falls back to an emptyDir of sizeLimit. Must stay writable (readOnlyRootFilesystem).
  artistImages:
    mountPath: /app/artist-images
    mediaSubPath: .yaytsa/artist-images
    sizeLimit: 1Gi

  # Writable store for materialized embedded cover art (scan time) and audiobook/iTunes/Deezer/Open
  # Library covers (enricher). Same rationale as artistImages: persisted under the media volume's
  # mediaSubPath when media is enabled (re-derivation is gated by metadata_checked_at, so an emptyDir
  # loses them on restart), else an emptyDir of sizeLimit. Must stay writable (readOnlyRootFilesystem).
  coverCache:
    mountPath: /app/cover-cache
    mediaSubPath: .yaytsa/cover-cache
    sizeLimit: 2Gi

  media:
    enabled: false
    # Provide ONE source. existingClaim (a pre-created PVC) works on any/multi-node cluster
    # and is preferred; hostPath is node-local (single-node only). existingClaim wins if set.
    existingClaim: ''
    hostPath: ''
    mountPath: /media
    # Keep read-only by default. Set false to let the metadata enricher write
    # cover.jpg into album folders (the only writes it performs; never audio).
    readOnly: true

  # Read-only mount of the audio-separator stems directory (separator writes
  # in `yay-tsa-production`, backend reads from the SAME host path in
  # `yay-tsa-v2-production`). Cross-namespace PVC sharing is impossible —
  # both pods mount the same hostPath directly.
  stems:
    enabled: false
    hostPath: ''
    mountPath: /app/stems

  # Off by default for portability: the policy below encodes the author's cluster topology
  # (Traefik in kube-system, Prometheus in monitoring, a shared DB namespace). Enable and
  # retarget these namespaces to match your cluster, or leave disabled.
  networkPolicy:
    enabled: false
    ingressNamespace: kube-system
    monitoringNamespace: monitoring
    databaseNamespace: shared-database

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault

ingress:
  enabled: false
  className: traefik
  stripApiPrefix: true
  additionalMiddlewares: []
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: yay-tsa-v2.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls:
    - hosts:
        - yay-tsa-v2.example.com
      secretName: yay-tsa-v2-tls
  secureHeaders:
    enabled: true
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
  subsonic:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    paths:
      - /rest

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

nodeSelector: {}
tolerations: []
affinity: {}

backend:
  enabled: true
  image:
    repository: ghcr.io/nikolay-e/yay-tsa-v2/backend
    pullPolicy: IfNotPresent
    tag: ''
  replicaCount: 1
  revisionHistoryLimit: 5

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

  podDisruptionBudget:
    enabled: false
    maxUnavailable: 1

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      memory: '1Gi'
      cpu: '500m'
      ephemeral-storage: '1Gi'
    limits:
      memory: '2Gi'
      cpu: '2'
      ephemeral-storage: '5Gi'

  jvm:
    opts: >-
      -XX:+UseContainerSupport
      -XX:MaxRAMPercentage=75.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:+ExitOnOutOfMemoryError

  probes:
    # startupProbe gates liveness/readiness so a slow JVM cold-start (image pull + Flyway +
    # Hikari) is never killed mid-boot. failureThreshold*periodSeconds = max startup budget (150s).
    startup:
      path: /manage/health/liveness
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 30
    liveness:
      path: /manage/health/liveness
      port: 8080
      initialDelaySeconds: 10
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /manage/health/readiness
      port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

  database:
    secretName: 'yay-tsa-postgres'
    name: 'yaytsa_production'
    hikari:
      maximumPoolSize: 10
      minimumIdle: 5

  config:
    profile: 'prod'
    logLevel: 'INFO'
    appLogLevel: 'INFO'
    corsEnabled: true
    corsOrigins: 'https://yay-tsa-v2.nikolay-eremeev.com'
    karaokeSeparatorUrl: 'http://yay-tsa-production-audio-separator:8000'
    demucsCommand: 'unsupported'
    libraryMusicPath: '/media'
    karaoke:
      enabled: false
      outputPath: '/app/stems'
      failThreshold: 3
    ml:
      enabled: false
      extractorScript: '' # path to in-container Python feature-extractor (absent = disabled)
      processTimeoutSeconds: 600
      batchSize: 50
    llm:
      enabled: false # stub until a local LLM is wired in; no external provider
      model: 'local-stub'
    mpd:
      enabled: false
      port: 6600
    lyrics:
      lrclib:
        enabled: true # keyless public lyrics provider (lrclib.net)

  media:
    enabled: false
    hostPath: ''
    mountPath: /media

  # Read-only mount of the audio-separator stems directory (separator writes
  # in `yay-tsa-production`, backend reads from the SAME host path in
  # `yay-tsa-v2-production`). Cross-namespace PVC sharing is impossible —
  # both pods mount the same hostPath directly.
  stems:
    enabled: false
    hostPath: ''
    mountPath: /app/stems

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault

ingress:
  enabled: false
  className: traefik
  stripApiPrefix: true
  additionalMiddlewares: []
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: yay-tsa-v2.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls:
    - hosts:
        - yay-tsa-v2.example.com
      secretName: yay-tsa-v2-tls
  secureHeaders:
    enabled: true
    stsSeconds: 63072000
    stsIncludeSubdomains: true
    stsPreload: true
  subsonic:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    paths:
      - /rest

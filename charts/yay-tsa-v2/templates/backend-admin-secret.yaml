{{- if and .Values.backend.enabled .Values.backend.adminBootstrap.enabled }}
{{- if and (eq (.Values.backend.adminBootstrap.existingSecret | toString) "") (ne (.Values.backend.adminBootstrap.password | toString) "") }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend-admin
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{ .Values.backend.adminBootstrap.existingSecretKey }}: {{ .Values.backend.adminBootstrap.password | quote }}
{{- end }}
{{- end }}

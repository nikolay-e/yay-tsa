{{- if and .Values.backend.enabled .Values.backend.serviceMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend-management
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-management
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.management.port }}
      targetPort: management
      protocol: TCP
      name: management
  selector:
    {{- include "yay-tsa-v2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
{{- end }}

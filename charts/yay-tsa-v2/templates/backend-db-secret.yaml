{{- if .Values.backend.enabled }}
{{- $global := .Values.global | default dict }}
{{- $gdb := $global.yaytsaDatabase | default dict }}
{{- if and (eq (.Values.backend.database.existingSecret | toString) "") (eq (.Values.backend.database.secretName | toString) "") (not $gdb.secretName) }}
{{- if eq (.Values.backend.database.host | toString) "" }}
{{- fail "backend.database: provide one of existingSecret, secretName, global.yaytsaDatabase.secretName, or backend.database.host/user/password" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend-db
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  POSTGRES_HOST: {{ .Values.backend.database.host | quote }}
  POSTGRES_PORT: {{ .Values.backend.database.port | quote }}
  POSTGRES_USER: {{ .Values.backend.database.user | quote }}
  POSTGRES_PASSWORD: {{ required "backend.database.password is required when rendering the DB secret" .Values.backend.database.password | quote }}
{{- end }}
{{- end }}

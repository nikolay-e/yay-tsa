{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  SERVER_PORT: "8080"
  LOG_LEVEL: {{ .Values.backend.config.logLevel | quote }}
  APP_LOG_LEVEL: {{ .Values.backend.config.appLogLevel | quote }}
  CORS_ENABLED: {{ .Values.backend.config.corsEnabled | quote }}
  CORS_ORIGINS: {{ .Values.backend.config.corsOrigins | quote }}
  HIKARI_MAX_POOL: {{ .Values.backend.database.hikari.maximumPoolSize | quote }}
  HIKARI_MIN_IDLE: {{ .Values.backend.database.hikari.minimumIdle | quote }}
  KARAOKE_ENABLED: {{ default false .Values.backend.config.karaoke.enabled | quote }}
  KARAOKE_OUTPUT_PATH: {{ .Values.backend.config.karaoke.outputPath | quote }}
  KARAOKE_FAIL_THRESHOLD: {{ .Values.backend.config.karaoke.failThreshold | quote }}
  LYRICS_LRCLIB_ENABLED: {{ default true .Values.backend.config.lyrics.lrclib.enabled | quote }}
  ML_ENABLED: {{ default false .Values.backend.config.ml.enabled | quote }}
  ML_EXTRACTOR_SCRIPT: {{ .Values.backend.config.ml.extractorScript | quote }}
  ML_PROCESS_TIMEOUT_SECONDS: {{ .Values.backend.config.ml.processTimeoutSeconds | quote }}
  ML_BATCH_SIZE: {{ .Values.backend.config.ml.batchSize | quote }}
  METADATA_ENABLED: {{ default false .Values.backend.config.metadata.enabled | quote }}
  METADATA_USER_AGENT: {{ .Values.backend.config.metadata.userAgent | quote }}
  METADATA_POLL_INTERVAL_MS: {{ .Values.backend.config.metadata.pollIntervalMs | quote }}
  METADATA_BATCH_SIZE: {{ .Values.backend.config.metadata.batchSize | quote }}
  METADATA_ARTIST_IMAGE_DIR: {{ .Values.backend.config.metadata.artistImageDir | quote }}
  METADATA_OPENLIBRARY_ENABLED: {{ default false .Values.backend.config.metadata.openLibraryEnabled | quote }}
  IMAGE_COVER_CACHE_DIR: {{ .Values.backend.config.image.coverCacheDir | quote }}
  LLM_ENABLED: {{ default false .Values.backend.config.llm.enabled | quote }}
  LLM_MODEL: {{ .Values.backend.config.llm.model | quote }}
  LLM_BASE_URL: {{ .Values.backend.config.llm.baseUrl | quote }}
  EMBEDDING_ENABLED: {{ default false .Values.backend.config.embedding.enabled | quote }}
  {{- if .Values.backend.config.embedding.enabled }}
  EMBEDDING_BASE_URL: {{ required "backend.config.embedding.baseUrl is required when backend.config.embedding.enabled=true" .Values.backend.config.embedding.baseUrl | quote }}
  {{- else }}
  EMBEDDING_BASE_URL: {{ .Values.backend.config.embedding.baseUrl | quote }}
  {{- end }}
  MPD_ENABLED: {{ default false .Values.backend.config.mpd.enabled | quote }}
  MPD_PORT: {{ .Values.backend.config.mpd.port | quote }}
  MPD_BIND_ADDRESS: {{ default "127.0.0.1" .Values.backend.config.mpd.bindAddress | quote }}
  LISTENBRAINZ_ENABLED: {{ default false .Values.backend.config.scrobbling.listenbrainz.enabled | quote }}
  LISTENBRAINZ_USERNAME: {{ .Values.backend.config.scrobbling.listenbrainz.username | quote }}
{{- end }}

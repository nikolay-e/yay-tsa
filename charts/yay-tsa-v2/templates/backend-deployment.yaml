{{- if .Values.backend.enabled }}
{{- $global := .Values.global | default dict }}
{{- $gdb := $global.yaytsaDatabase | default dict }}
{{- $dbSecret := .Values.backend.database.existingSecret | default .Values.backend.database.secretName | default $gdb.secretName | default (printf "%s-backend-db" (include "yay-tsa-v2.fullname" .)) }}
{{- $adminSecret := .Values.backend.adminBootstrap.existingSecret | default (printf "%s-backend-admin" (include "yay-tsa-v2.fullname" .)) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit | default 5 }}
  selector:
    matchLabels:
      {{- include "yay-tsa-v2.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        # Hash only the values feeding the ConfigMap data, not the rendered manifest: the
        # manifest's helm.sh/chart label changes on every chart release, which restarted the
        # production backend (killing active streams) on every push to the repo.
        checksum/config: {{ print (toYaml .Values.backend.config) (toYaml .Values.backend.database.hikari) | sha256sum }}
      labels:
        {{- include "yay-tsa-v2.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- if .Values.imagePullSecrets }}
      {{- include "yay-tsa-common.deployment.imagePullSecrets" . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.backend.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.backend.securityContext.runAsUser }}
        runAsGroup: {{ .Values.backend.securityContext.runAsGroup }}
        fsGroup: {{ .Values.backend.securityContext.fsGroup }}
        seccompProfile:
          type: {{ .Values.backend.securityContext.seccompProfile.type }}
      terminationGracePeriodSeconds: 60
      # Pod doesn't call the Kubernetes API; suppress the auto-mounted SA token.
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: {{ .Values.backend.management.port }}
              protocol: TCP
            {{- if .Values.backend.config.mpd.enabled }}
            - name: mpd
              containerPort: {{ .Values.backend.config.mpd.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: JAVA_OPTS
              value: {{ .Values.backend.jvm.opts | quote }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.config.profile | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.backend.management.port | quote }}
            - name: GIT_SHA
              value: {{ .Values.backend.image.tag | default .Chart.AppVersion | quote }}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: POSTGRES_PORT
            - name: DB_NAME
              value: {{ .Values.backend.database.name | quote }}
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $dbSecret }}
                  key: POSTGRES_PASSWORD
            - name: ADMIN_BOOTSTRAP_ENABLED
              value: {{ .Values.backend.adminBootstrap.enabled | quote }}
            - name: ADMIN_BOOTSTRAP_USERNAME
              value: {{ .Values.backend.adminBootstrap.username | quote }}
            - name: ADMIN_BOOTSTRAP_DISPLAY_NAME
              value: {{ .Values.backend.adminBootstrap.displayName | quote }}
            {{- if .Values.backend.adminBootstrap.enabled }}
            - name: ADMIN_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $adminSecret }}
                  key: {{ .Values.backend.adminBootstrap.existingSecretKey }}
                  optional: true
            {{- end }}
            - name: KARAOKE_SEPARATOR_URL
              value: {{ .Values.backend.config.karaokeSeparatorUrl | quote }}
            - name: DEMUCS_COMMAND
              value: {{ .Values.backend.config.demucsCommand | quote }}
            {{- if .Values.backend.media.enabled }}
            - name: MUSIC_PATH
              value: {{ .Values.backend.config.libraryMusicPath | quote }}
            {{- end }}
            {{- if .Values.backend.config.llm.enabled }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.config.llm.apiKeySecret }}
                  key: {{ .Values.backend.config.llm.apiKeySecretKey }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "yay-tsa-v2.fullname" . }}-backend
          {{- include "yay-tsa-common.deployment.standardProbes" (dict "startup" .Values.backend.probes.startup "liveness" .Values.backend.probes.liveness "readiness" .Values.backend.probes.readiness) | nindent 10 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.backend.securityContext.allowPrivilegeEscalation }}
            capabilities:
              drop:
                {{- range .Values.backend.securityContext.capabilities.drop }}
                - {{ . }}
                {{- end }}
            readOnlyRootFilesystem: {{ .Values.backend.securityContext.readOnlyRootFilesystem }}
            runAsNonRoot: {{ .Values.backend.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.backend.securityContext.runAsUser }}
          volumeMounts:
            - name: jvm-tmp
              mountPath: /tmp
            - name: logs-volume
              mountPath: /app/logs
            - name: artist-images
              mountPath: {{ .Values.backend.config.metadata.artistImageDir }}
            - name: cover-cache
              mountPath: {{ .Values.backend.config.image.coverCacheDir }}
            {{- if .Values.backend.media.enabled }}
            - name: media
              mountPath: {{ .Values.backend.media.mountPath }}
              readOnly: {{ .Values.backend.media.readOnly }}
            {{- end }}
            {{- if .Values.backend.stems.enabled }}
            - name: stems
              mountPath: {{ .Values.backend.stems.mountPath }}
              readOnly: true
            {{- end }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      volumes:
        - name: logs-volume
          emptyDir: {}
        - name: jvm-tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
        - name: artist-images
          emptyDir:
            sizeLimit: {{ .Values.backend.artistImages.sizeLimit }}
        - name: cover-cache
          emptyDir:
            sizeLimit: {{ .Values.backend.coverCache.sizeLimit }}
        {{- if .Values.backend.media.enabled }}
        - name: media
          {{- if .Values.backend.media.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.backend.media.existingClaim }}
          {{- else }}
          hostPath:
            path: {{ .Values.backend.media.hostPath }}
            type: Directory
          {{- end }}
        {{- end }}
        {{- if .Values.backend.stems.enabled }}
        - name: stems
          hostPath:
            path: {{ .Values.backend.stems.hostPath }}
            type: Directory
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if and .Values.backend.enabled .Values.backend.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "yay-tsa-v2.fullname" . }}-backend
  labels:
    {{- include "yay-tsa-v2.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    {{- with .Values.backend.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "yay-tsa-v2.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  endpoints:
    - port: http
      path: /manage/prometheus
      interval: {{ .Values.backend.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.backend.serviceMonitor.scrapeTimeout | default "10s" }}
      scheme: http
{{- end }}

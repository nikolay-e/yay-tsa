fullnameOverride: ''

image:
  repository: pgvector/pgvector
  tag: pg17
  pullPolicy: IfNotPresent

service:
  port: 5432

persistence:
  enabled: true
  size: 8Gi
  storageClass: ''

resources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: '2'
    memory: 1Gi
    ephemeral-storage: 1Gi

# Postgres image runs as uid 999 (debian) by default; fsGroup lets it own the PVC.
podSecurityContext:
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

# readOnlyRootFilesystem is intentionally omitted: the pgvector image writes to
# /var/run/postgresql (unix socket) and initdb-time paths outside the data volume.
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
tolerations: []
affinity: {}

# Shared DB identity. The umbrella sets these via global.yaytsaDatabase; the Secret
# named here is rendered by the umbrella (single source of truth) and consumed below.
global:
  yaytsaDatabase:
    secretName: yaytsa-db
    name: yaytsa
    username: yaytsa
    password: ''

{{- /*
Single source of truth for the DB connection Secret (keys POSTGRES_HOST/PORT/USER/
PASSWORD/DB). Consumed by both the bundled Postgres and the backend. Skipped when an
external existingSecret is supplied (the user owns it then).
*/ -}}
{{- $gdbName := ((.Values.global | default dict).yaytsaDatabase | default dict).secretName | default "yaytsa-db" }}
{{- if and .Values.externalDatabase.existingSecret (ne (.Values.externalDatabase.existingSecret | toString) $gdbName) }}
{{- fail (printf "externalDatabase.existingSecret=%q but the backend reads the Secret named global.yaytsaDatabase.secretName=%q. Set them equal: --set global.yaytsaDatabase.secretName=%s" .Values.externalDatabase.existingSecret $gdbName .Values.externalDatabase.existingSecret) }}
{{- end }}
{{- if not .Values.externalDatabase.existingSecret }}
{{- $secretName := include "yay-tsa-stack.dbSecretName" . }}
{{- $gdb := (.Values.global | default dict).yaytsaDatabase | default dict }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $host := "" }}{{- $port := "" }}{{- $user := "" }}{{- $db := "" }}{{- $pw := "" }}
{{- if .Values.postgresql.enabled }}
  {{- $host = printf "%s-postgres" .Release.Name }}
  {{- $port = "5432" }}
  {{- $user = $gdb.username | default "yaytsa" }}
  {{- $db = $gdb.name | default "yaytsa" }}
  {{- if $existing }}
    {{- $pw = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else if $gdb.password }}
    {{- $pw = $gdb.password }}
  {{- else }}
    {{- $pw = randAlphaNum 24 }}
  {{- end }}
{{- else }}
  {{- $host = required "externalDatabase.host is required when postgresql.enabled=false" .Values.externalDatabase.host }}
  {{- $port = .Values.externalDatabase.port | toString }}
  {{- $user = .Values.externalDatabase.user | default "yaytsa" }}
  {{- $db = .Values.externalDatabase.database | default "yaytsa" }}
  {{- /* External DB: the operator-supplied password is the source of truth (not tied to a
        kept PVC like the bundled DB), so it must WIN — otherwise rotating it via `helm upgrade`
        is silently ignored because the kept Secret already holds the old value. */ -}}
  {{- $pw = required "externalDatabase.password (or externalDatabase.existingSecret) is required" .Values.externalDatabase.password }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: yay-tsa-stack
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    # The bundled-DB password is generated once and must survive `helm uninstall`: the
    # StatefulSet PVC is never deleted by Helm, so regenerating the password on reinstall
    # would lock the backend out of the existing data dir (password authentication failed).
    # Kept secret + retained PVC stay in sync. To fully wipe: delete this Secret AND the PVC.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  POSTGRES_HOST: {{ $host | quote }}
  POSTGRES_PORT: {{ $port | quote }}
  POSTGRES_USER: {{ $user | quote }}
  POSTGRES_PASSWORD: {{ $pw | quote }}
  POSTGRES_DB: {{ $db | quote }}
{{- end }}

{{- /*
Single source of truth for the DB connection Secret (keys POSTGRES_HOST/PORT/USER/
PASSWORD/DB). Consumed by both the bundled Postgres and the backend. Skipped when an
external existingSecret is supplied (the user owns it then).
*/ -}}
{{- if not .Values.externalDatabase.existingSecret }}
{{- $secretName := include "yay-tsa-stack.dbSecretName" . }}
{{- $gdb := (.Values.global | default dict).yaytsaDatabase | default dict }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $host := "" }}{{- $port := "" }}{{- $user := "" }}{{- $db := "" }}{{- $pw := "" }}
{{- if .Values.postgresql.enabled }}
  {{- $host = printf "%s-postgres" .Release.Name }}
  {{- $port = "5432" }}
  {{- $user = $gdb.username | default "yaytsa" }}
  {{- $db = $gdb.name | default "yaytsa" }}
  {{- if $existing }}
    {{- $pw = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else if $gdb.password }}
    {{- $pw = $gdb.password }}
  {{- else }}
    {{- $pw = randAlphaNum 24 }}
  {{- end }}
{{- else }}
  {{- $host = required "externalDatabase.host is required when postgresql.enabled=false" .Values.externalDatabase.host }}
  {{- $port = .Values.externalDatabase.port | toString }}
  {{- $user = .Values.externalDatabase.user | default "yaytsa" }}
  {{- $db = .Values.externalDatabase.database | default "yaytsa" }}
  {{- if $existing }}
    {{- $pw = index $existing.data "POSTGRES_PASSWORD" | b64dec }}
  {{- else }}
    {{- $pw = required "externalDatabase.password (or externalDatabase.existingSecret) is required" .Values.externalDatabase.password }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    app.kubernetes.io/name: yay-tsa-stack
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  POSTGRES_HOST: {{ $host | quote }}
  POSTGRES_PORT: {{ $port | quote }}
  POSTGRES_USER: {{ $user | quote }}
  POSTGRES_PASSWORD: {{ $pw | quote }}
  POSTGRES_DB: {{ $db | quote }}
{{- end }}

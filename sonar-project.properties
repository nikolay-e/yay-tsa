sonar.projectKey=nikolay-e_yay-tsa

# yay-tsa-v2 IS the production backend (v1 retired 2026-05-16) -- it is no longer excluded
# here. detekt is re-armed with per-module baselines, so the backend gets both detekt and
# this SonarCloud scan.
#
# Exclude historical Flyway migration files that contain only password operations.
# These contain bcrypt password hashes (NOT plaintext passwords) for seed data.
# BCrypt hashes are one-way and cannot be reversed.
# Migration files cannot be modified without breaking Flyway checksum validation.
sonar.exclusions=**/db/migration/V2__add_users.sql,**/db/migration/V3__restore_passwords.sql,**/db/migration/V7__restore_admin_user.sql

# Suppress secrets detection in remaining migration files (V1 schema has one seed user).
# List specific rule IDs because SonarCloud may not support wildcards in properties files.
sonar.issue.ignore.multicriteria=bcrypt_secrets,bcrypt_pg,bcrypt_db,bcrypt_java,tailwind_utility,plsql_varchar,plsql_orderby,void_operator

sonar.issue.ignore.multicriteria.bcrypt_secrets.ruleKey=secrets:*
sonar.issue.ignore.multicriteria.bcrypt_secrets.resourceKey=**/db/migration/*.sql

sonar.issue.ignore.multicriteria.bcrypt_pg.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.bcrypt_pg.resourceKey=**/db/migration/*.sql

sonar.issue.ignore.multicriteria.bcrypt_db.ruleKey=secrets:S6703
sonar.issue.ignore.multicriteria.bcrypt_db.resourceKey=**/db/migration/*.sql

sonar.issue.ignore.multicriteria.bcrypt_java.ruleKey=java:S6418
sonar.issue.ignore.multicriteria.bcrypt_java.resourceKey=**/db/migration/*.sql

sonar.issue.ignore.multicriteria.tailwind_utility.ruleKey=css:S4661
sonar.issue.ignore.multicriteria.tailwind_utility.resourceKey=apps/web/src/**/*.css

# Suppress plsql:VarcharUsageCheck on PostgreSQL Flyway migrations — Sonar's
# PL/SQL analyzer flags VARCHAR as Oracle-incorrect, but PostgreSQL has no
# VARCHAR2 type and treats VARCHAR as the standard SQL string type.
sonar.issue.ignore.multicriteria.plsql_varchar.ruleKey=plsql:VarcharUsageCheck
sonar.issue.ignore.multicriteria.plsql_varchar.resourceKey=**/db/migration/*.sql

# Suppress plsql:OrderByExplicitAscCheck on PostgreSQL migrations — same reason.
sonar.issue.ignore.multicriteria.plsql_orderby.ruleKey=plsql:OrderByExplicitAscCheck
sonar.issue.ignore.multicriteria.plsql_orderby.resourceKey=**/db/migration/*.sql

# Suppress typescript:S3735 ("void" should not be used) across the whole frontend.
# @typescript-eslint/no-floating-promises is 'error' with its default ignoreVoid: true,
# so void asyncFn() is this codebase's REQUIRED, ESLint-enforced way to mark an
# intentionally-unawaited promise -- not the void-for-obfuscation pattern the Sonar rule
# targets. Removing void from any of these call sites would trigger a floating-promises
# lint error, so per-instance "fixes" aren't an option; this is a rule/style conflict.
sonar.issue.ignore.multicriteria.void_operator.ruleKey=typescript:S3735
sonar.issue.ignore.multicriteria.void_operator.resourceKey=apps/web/src/**/*
